<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>to‑do · week ⇄ month</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            padding: 0;
            margin: 0;
        }

        .app {
            max-width: 480px;
            width: 100%;
            height: 100vh;
            max-height: -webkit-fill-available;
            background: white;
            box-shadow: 0 0 30px rgba(0, 15, 30, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0;
            margin: 0;
            padding: 0 1rem 0.5rem 1rem;
        }

        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.2rem 0 0.2rem 0;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0.5rem 0 0.2rem 0;
            padding: 0;
            flex-shrink: 0;
        }

        .title-area h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(145deg, #1f3449, #2b4f74);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .plus-btn {
            width: 56px;
            height: 56px;
            background: #1f3449;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.4rem;
            font-weight: 300;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(25, 55, 80, 0.3);
            border: none;
            transition: 0.1s;
            flex-shrink: 0;
        }

        .plus-btn:active {
            background: #2b4f74;
            transform: scale(0.94);
        }

        /* professional stats row */
        .stats-row {
            display: flex;
            gap: 8px;
            margin: 0.6rem 0 1rem 0;
            flex-shrink: 0;
        }

        .stat-card {
            flex: 1;
            background: #ffffff;
            border-radius: 24px;
            padding: 0.7rem 0.1rem;
            text-align: center;
            font-weight: 500;
            font-size: 0.85rem;
            color: #25435f;
            border: 1px solid #e2eaf3;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 20, 40, 0.02);
        }

        .stat-card span:first-child {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a3750;
            line-height: 1.2;
        }

        .section-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin: 0 0 0.4rem 0.2rem;
            color: #1e3b5a;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }

        .task-item {
            background: white;
            border: 1px solid #dee9f2;
            border-radius: 50px;
            padding: 0.2rem 0.2rem 0.2rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.01);
        }

        .task-check {
            width: 36px;
            height: 36px;
            border-radius: 30px;
            border: 2.5px solid #b6cde5;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .task-content {
            flex: 1;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1a3146;
            word-break: break-word;
            padding: 0.3rem 0;
        }

        .date-badge {
            font-size: 0.65rem;
            background: #eaf1fa;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            margin-left: 0.3rem;
            font-weight: 400;
            color: #2b4f74;
            white-space: nowrap;
        }

        .task-delete {
            background: transparent;
            border: none;
            color: #9bb3cf;
            font-size: 1.3rem;
            padding: 0.6rem 1rem 0.6rem 0.2rem;
            cursor: pointer;
        }

        .archive-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #eef4fa;
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            margin: 0.8rem 0 0.5rem;
            border: 1px solid #c5d8f0;
            cursor: pointer;
            font-weight: 600;
            color: #1f3f60;
            flex-shrink: 0;
        }

        .archive-list {
            display: none;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 0.8rem;
            max-height: 140px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .archive-list.visible { display: flex; }

        .archive-item {
            background: #f4faff;
            border: 1px dashed #adc5e2;
            border-radius: 40px;
            padding: 0.6rem 1.2rem;
            opacity: 0.85;
        }

        /* ---------- CALENDAR CARD (shared) ---------- */
        .calendar-card {
            background: white;
            border-radius: 32px;
            padding: 0.8rem 0.5rem 0.6rem;
            border: 1px solid #dae6f2;
            margin: 0.4rem 0 0.5rem;
            flex-shrink: 0;
            touch-action: pan-y pinch-zoom;
        }

        .selected-date-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f2f8ff;
            padding: 0.6rem 1.2rem;
            border-radius: 50px;
            margin-bottom: 0.7rem;
            font-weight: 600;
            color: #1e3f60;
        }
        /* make the 📅 icon clickable */
        .calendar-toggle-icon {
            cursor: pointer;
            padding: 0.3rem 0.6rem;
            border-radius: 30px;
            transition: background 0.1s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .calendar-toggle-icon:active {
            background: #d9e6f5;
        }

        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            padding: 0 0.2rem;
        }

        .cal-month {
            font-weight: 700;
            font-size: 1.2rem;
            color: #1d3f62;
        }

        .cal-nav {
            display: flex;
            gap: 8px;
        }
        .cal-nav button {
            background: white;
            border: 1px solid #c9d9ee;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            color: #1e3f60;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cal-nav button:active { background: #dae6f2; }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            color: #38658f;
            font-size: 0.75rem;
            margin: 0.2rem 0;
        }

        /* both week-grid and month-grid share cell style */
        .week-grid, .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            transition: 0.1s;
        }
        .month-grid { margin-bottom: 0.2rem; }

        .cal-cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f9fcff;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e3c5c;
            border: 1px solid transparent;
            cursor: pointer;
            padding: 4px 0;
        }

        .cal-cell:active {
            background: #d9e6f5;
            transform: scale(0.96);
        }

        .cal-cell.has-tasks {
            background: #e1effb;
            border-color: #9bbde0;
        }

        .cal-cell.today {
            background: #2b4f74;
            color: white;
            font-weight: 700;
        }

        .cal-cell.selected {
            background: #ffe1b3;
            border: 2px solid #e67e22;
            color: #1d2b3a;
            font-weight: 700;
        }

        .task-dots {
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            color: #2b4f74;
            margin-top: 2px;
            line-height: 1;
        }
        .today .task-dots { color: #ffddb0; }

        .footer-btn {
            background: transparent;
            border: 1.5px solid #c4d6ec;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            color: #1d4569;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            margin: 0.5rem 0 0.2rem;
            width: 100%;
            flex-shrink: 0;
        }

        /* modal unchanged */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1rem;
        }

        .modal-card {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 48px;
            padding: 2rem 1.5rem;
        }
        .modal-date { font-weight: 700; font-size: 1.7rem; color: #1d3f62; background: #e9f2fc; padding: 0.8rem 1rem; border-radius: 60px; text-align: center; margin-bottom: 1.2rem; }
        .modal-input { padding: 1.2rem 1.5rem; border: 2px solid #c9d9ee; border-radius: 60px; font-size: 1rem; width: 100%; margin-bottom: 1rem; }
        .time-picker-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.5rem; background: #f2f8ff; padding: 0.8rem 1.2rem; border-radius: 60px; }
        .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
        .modal-btn { background: #1f3449; color: white; border: none; padding: 1rem 2rem; border-radius: 60px; font-weight: 600; font-size: 1rem; cursor: pointer; flex: 1; }
        .modal-btn.cancel { background: #e2eaf3; color: #1d3f62; }
        .empty-message { text-align: center; color: #8ba3c2; padding: 1.2rem 1rem; background: #f6faff; border-radius: 50px; font-size: 0.9rem; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app">
    <div class="header">
        <div class="title-area"><h1>TO-DO</h1></div>
        <div class="plus-btn" id="plusBtn">+</div>
    </div>

    <div class="stats-row">
        <div class="stat-card"><span id="activeCount">0</span> active</div>
        <div class="stat-card"><span id="completedCount">0</span> done</div>
        <div class="stat-card"><span id="monthCount">0</span> this month</div>
    </div>

    <div class="scrollable-content">
        <div class="section-title"><i class="fas fa-list-check"></i> <span id="selectedDateHeading"></span></div>
        <div id="activeTaskList" class="task-list"></div>

        <div class="archive-header" id="archiveToggle">
            <i class="fas fa-archive" id="archiveIcon"></i> COMPLETED <span id="archiveCount">(0)</span>
        </div>
        <div id="archiveListContainer" class="archive-list"></div>

        <!-- Calendar card – toggle view by clicking 📅 -->
        <div class="calendar-card" id="calendarSwipeArea">
            <div class="selected-date-row">
                <span class="calendar-toggle-icon" id="toggleViewIcon">📅</span>
                <span id="selectedDateDisplay"></span>
            </div>
            <div class="cal-header">
                <span class="cal-month" id="monthYearDisplay"></span>
                <div class="cal-nav">
                    <button id="prevBtn">←</button>
                    <button id="nextBtn">→</button>
                </div>
            </div>
            <div class="weekdays">
                <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
            </div>
            <!-- dynamic container: week or month -->
            <div id="calendarDynamicGrid" class="week-grid"></div>
        </div>

        <button class="footer-btn" id="clearArchiveBtn">🗑️ CLEAR ARCHIVE</button>
    </div>

    <!-- modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <div class="modal-date" id="modalDate"></div>
            <input type="text" class="modal-input" id="modalTaskInput" placeholder="e.g., buy milk" autofocus>
            <div class="time-picker-row">
                <label>⏰</label>
                <input type="time" id="modalTimeInput" value="09:00">
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
                <button class="modal-btn" id="modalAdd">ADD</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- data ---
        let activeTasks = [], completedTasks = [];
        const STORAGE_KEY = 'todo_toggle_weekmonth';
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const data = JSON.parse(stored);
                activeTasks = data.active || [];
                completedTasks = data.completed || [];
            } catch (e) { resetSample(); }
        } else { resetSample(); }

        function resetSample() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth()+1).padStart(2,'0');
            const d = String(today.getDate()).padStart(2,'0');
            activeTasks = [
                { id: 'a1', text: 'cbse syllabus', date: `${y}-${m}-05`, time: '10:00' },
                { id: 'a2', text: 'yoga / stretch', date: `${y}-${m}-${d}`, time: '07:30' },
                { id: 'a3', text: 'team meeting', date: `${y}-${m}-12`, time: '14:00' },
                { id: 'a4', text: 'call electrician', date: `${y}-${m}-15`, time: '16:30' },
            ];
            completedTasks = [
                { id: 'c1', text: 'read 30 pages', date: `${y}-${m}-${d}`, time: '21:00' },
                { id: 'c2', text: 'buy groceries', date: `${y}-${m}-07`, time: '18:00' },
            ];
        }

        // state
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let baseDate = new Date();         // for week anchor (sunday)
        baseDate.setDate(baseDate.getDate() - baseDate.getDay()); // go to week start

        let selectedDate = (() => {
            const t = new Date();
            return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
        })();

        let archiveVisible = false;
        let viewMode = 'week';             // 'week' or 'month'

        // ---------- helpers ----------
        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ active: activeTasks, completed: completedTasks })); }
        function formatDisplay(iso) { const [y,m,d]=iso.split('-'); const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`; }
        function activeCountForDate(dateStr) { return activeTasks.filter(t => t.date === dateStr).length; }

        // ---------- reminder & feedback ----------
        function playFeedback(type = 'reminder') {
            if (navigator.vibrate) {
                if (type === 'reminder') navigator.vibrate([200, 100, 200]);
                else if (type === 'complete') navigator.vibrate(80);
            }
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const resumeAndPlay = () => {
                    if (type === 'reminder') {
                        const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
                        osc1.connect(gain1); gain1.connect(audioCtx.destination);
                        osc1.frequency.value = 880; gain1.gain.value = 0.3;
                        osc1.start(); osc1.stop(audioCtx.currentTime + 0.15);
                        setTimeout(() => {
                            const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();
                            osc2.connect(gain2); gain2.connect(audioCtx.destination);
                            osc2.frequency.value = 880; gain2.gain.value = 0.3;
                            osc2.start(); osc2.stop(audioCtx.currentTime + 0.15);
                        }, 250);
                    } else if (type === 'complete') {
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.frequency.value = 800; gain.gain.value = 0.25;
                        osc.start(); osc.stop(audioCtx.currentTime + 0.12);
                    }
                };
                if (audioCtx.state === 'suspended') audioCtx.resume().then(resumeAndPlay);
                else resumeAndPlay();
            } catch (e) {}
        }

        setInterval(() => {
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            if (activeTasks.some(t => t.date === todayStr && t.time === currentTime)) playFeedback('reminder');
        }, 30000);
        setTimeout(() => playFeedback('reminder'), 2000);

        // ---------- render dynamic grid based on viewMode ----------
        function renderCalendar() {
            const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            let titleMonth = currentMonth, titleYear = currentYear;
            if (viewMode === 'week') {
                // derive month/year from baseDate (first day of week)
                const week = getWeekDays(baseDate);
                titleMonth = week[0].getMonth();
                titleYear = week[0].getFullYear();
            }
            document.getElementById('monthYearDisplay').innerText = `${monthNames[titleMonth]} ${titleYear}`;
            document.getElementById('selectedDateDisplay').innerText = formatDisplay(selectedDate);
            document.getElementById('selectedDateHeading').innerText = selectedDate;

            const container = document.getElementById('calendarDynamicGrid');
            if (viewMode === 'week') {
                container.className = 'week-grid';
                renderWeekGrid(container);
            } else {
                container.className = 'month-grid';
                renderMonthGrid(container);
            }
            attachCellListeners();
        }

        // week grid based on baseDate
        function getWeekDays(refDate) {
            const start = new Date(refDate);
            start.setHours(0,0,0,0);
            const day = start.getDay();
            start.setDate(start.getDate() - day);
            const week = [];
            for (let i=0; i<7; i++) {
                const d = new Date(start);
                d.setDate(start.getDate() + i);
                week.push(d);
            }
            return week;
        }

        function renderWeekGrid(container) {
            const week = getWeekDays(baseDate);
            const today = new Date();
            let html = '';
            week.forEach(date => {
                const y = date.getFullYear();
                const m = String(date.getMonth()+1).padStart(2,'0');
                const d = String(date.getDate()).padStart(2,'0');
                const dateStr = `${y}-${m}-${d}`;
                const count = activeCountForDate(dateStr);
                const isToday = date.toDateString() === today.toDateString();
                const isSelected = (dateStr === selectedDate);
                let cls = 'cal-cell';
                if (count > 0) cls += ' has-tasks';
                if (isToday) cls += ' today';
                if (isSelected) cls += ' selected';
                const dots = '●'.repeat(Math.min(count, 5));
                html += `<div class="${cls}" data-date="${dateStr}"><span>${date.getDate()}</span><span class="task-dots">${dots}</span></div>`;
            });
            container.innerHTML = html;
        }

        function renderMonthGrid(container) {
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();
            const isCurrentMonth = (today.getFullYear() === currentYear && today.getMonth() === currentMonth);
            let html = '';
            for (let i = 0; i < 42; i++) {
                const dayNum = i - firstDay + 1;
                if (dayNum > 0 && dayNum <= daysInMonth) {
                    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
                    const count = activeCountForDate(dateStr);
                    const isToday = isCurrentMonth && dayNum === today.getDate();
                    const isSelected = (dateStr === selectedDate);
                    let cls = 'cal-cell';
                    if (count > 0) cls += ' has-tasks';
                    if (isToday) cls += ' today';
                    if (isSelected) cls += ' selected';
                    const dots = '●'.repeat(Math.min(count, 5));
                    html += `<div class="${cls}" data-date="${dateStr}"><span>${dayNum}</span><span class="task-dots">${dots}</span></div>`;
                } else {
                    html += `<div class="cal-cell" style="background:transparent; pointer-events:none;"></div>`;
                }
            }
            container.innerHTML = html;
        }

        function attachCellListeners() {
            document.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
                cell.removeEventListener('click', cellClickHandler);
                cell.addEventListener('click', cellClickHandler);
            });
        }
        function cellClickHandler(e) {
            const date = e.currentTarget.dataset.date;
            if (date) {
                selectedDate = date;
                renderCalendar();
                renderActiveList();
            }
        }

        // navigation (both modes)
        function navigate(direction) {
            if (viewMode === 'week') {
                baseDate.setDate(baseDate.getDate() + direction * 7);
                baseDate = new Date(baseDate);
                currentMonth = baseDate.getMonth();
                currentYear = baseDate.getFullYear();
            } else {
                if (direction === 1) { // next month
                    if (currentMonth === 11) { currentMonth = 0; currentYear++; }
                    else currentMonth++;
                } else {
                    if (currentMonth === 0) { currentMonth = 11; currentYear--; }
                    else currentMonth--;
                }
                // also align baseDate near first week of month? keep week consistent: set baseDate to first sunday of month
                const firstOfMonth = new Date(currentYear, currentMonth, 1);
                baseDate = new Date(firstOfMonth);
                baseDate.setDate(firstOfMonth.getDate() - firstOfMonth.getDay()); // go to sunday
            }
            renderCalendar();
            renderActiveList();
        }

        // toggle mode when clicking 📅 icon
        function toggleViewMode() {
            viewMode = (viewMode === 'week' ? 'month' : 'week');
            // sync month/year from selected date if needed
            if (viewMode === 'month') {
                const [y,m] = selectedDate.split('-').map(Number);
                currentYear = y;
                currentMonth = m - 1;
                // set baseDate to first week of that month (for consistency when switching back)
                const first = new Date(currentYear, currentMonth, 1);
                baseDate = new Date(first);
                baseDate.setDate(first.getDate() - first.getDay());
            } else {
                // week mode: ensure baseDate is around selected date
                const sel = new Date(selectedDate);
                baseDate = new Date(sel);
                baseDate.setDate(sel.getDate() - sel.getDay());
                currentMonth = baseDate.getMonth();
                currentYear = baseDate.getFullYear();
            }
            renderCalendar();
        }

        // active tasks & archive
        function renderActiveList() {
            const container = document.getElementById('activeTaskList');
            const filtered = activeTasks.filter(t => t.date === selectedDate);
            if (!filtered.length) {
                container.innerHTML = `<div class="empty-message">✨ no active tasks for this date</div>`;
            } else {
                let html = '';
                filtered.forEach(t => {
                    const timeDisplay = t.time ? ` ⏰ ${t.time}` : '';
                    html += `
                        <div class="task-item" data-id="${t.id}">
                            <div class="task-check" data-id="${t.id}" data-action="toggle"></div>
                            <div class="task-content">${escapeHtml(t.text)}${timeDisplay}<span class="date-badge">${t.date}</span></div>
                            <button class="task-delete" data-id="${t.id}" data-action="delete"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }
            attachActiveListeners();
            updateStats();
        }

        function renderArchive() {
            const container = document.getElementById('archiveListContainer');
            document.getElementById('archiveCount').innerText = `(${completedTasks.length})`;
            if (!completedTasks.length) {
                container.innerHTML = `<div class="empty-message" style="padding:1rem;">no completed tasks</div>`;
            } else {
                let html = '';
                completedTasks.slice().reverse().forEach(t => {
                    const timeDisplay = t.time ? ` ⏰ ${t.time}` : '';
                    html += `<div class="archive-item"><div class="task-content">${escapeHtml(t.text)}${timeDisplay}<span class="date-badge">${t.date}</span></div></div>`;
                });
                container.innerHTML = html;
            }
        }

        function escapeHtml(str) { return str.replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); }

        function attachActiveListeners() {
            document.querySelectorAll('[data-action="toggle"]').forEach(el => {
                el.removeEventListener('click', handleToggle); el.addEventListener('click', handleToggle);
            });
            document.querySelectorAll('[data-action="delete"]').forEach(el => {
                el.removeEventListener('click', handleDelete); el.addEventListener('click', handleDelete);
            });
        }

        function handleToggle(e) {
            const id = e.currentTarget.dataset.id;
            const idx = activeTasks.findIndex(t => t.id === id);
            if (idx !== -1) {
                const [moved] = activeTasks.splice(idx, 1);
                completedTasks.push(moved);
                save(); playFeedback('complete');
                renderCalendar(); renderActiveList(); renderArchive(); updateStats();
            }
        }

        function handleDelete(e) {
            const id = e.currentTarget.dataset.id;
            activeTasks = activeTasks.filter(t => t.id !== id);
            save(); renderCalendar(); renderActiveList(); updateStats();
        }

        function updateStats() {
            document.getElementById('activeCount').innerText = activeTasks.length;
            document.getElementById('completedCount').innerText = completedTasks.length;
            const monthStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
            const monthDone = completedTasks.filter(t => t.date.startsWith(monthStr)).length;
            document.getElementById('monthCount').innerText = monthDone;
        }

        // modal
        function openModal() {
            document.getElementById('modalDate').innerText = `📅 ${selectedDate}`;
            document.getElementById('modalTaskInput').value = '';
            document.getElementById('modalTimeInput').value = '09:00';
            document.getElementById('modalOverlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modalTaskInput').focus(), 100);
        }
        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        function addTaskFromModal() {
            const inp = document.getElementById('modalTaskInput');
            const text = inp.value.trim();
            if (!text) return;
            const time = document.getElementById('modalTimeInput').value;
            activeTasks.push({ id: Date.now()+'-'+Math.random().toString(36).substr(2,6), text, date: selectedDate, time: time||null });
            save(); inp.value = ''; closeModal(); renderCalendar(); renderActiveList();
        }

        function clearArchive() {
            if (completedTasks.length && confirm('Permanently delete all completed tasks?')) {
                completedTasks = []; save(); renderArchive(); updateStats();
            }
        }

        // swipe for week mode only? we keep swipe for week, but also handle simple prev/next buttons for month.
        const swipeArea = document.getElementById('calendarSwipeArea');
        let touchStartX = 0;
        swipeArea.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        swipeArea.addEventListener('touchend', (e) => {
            if (!touchStartX) return;
            const diff = e.changedTouches[0].screenX - touchStartX;
            const threshold = 40;
            if (Math.abs(diff) > threshold) {
                if (diff > 0) navigate(-1); // prev
                else navigate(1);            // next
            }
            touchStartX = 0;
        });

        // init
        window.addEventListener('DOMContentLoaded', () => {
            // set initial baseDate to week of today
            const today = new Date();
            baseDate = new Date(today);
            baseDate.setDate(today.getDate() - today.getDay());
            currentMonth = baseDate.getMonth();
            currentYear = baseDate.getFullYear();

            renderCalendar();
            renderActiveList();
            renderArchive();
            updateStats();

            document.getElementById('plusBtn').addEventListener('click', openModal);
            document.getElementById('modalAdd').addEventListener('click', addTaskFromModal);
            document.getElementById('modalCancel').addEventListener('click', closeModal);
            document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });
            document.getElementById('modalTaskInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addTaskFromModal(); });

            document.getElementById('archiveToggle').addEventListener('click', () => {
                archiveVisible = !archiveVisible;
                document.getElementById('archiveListContainer').classList.toggle('visible', archiveVisible);
                document.getElementById('archiveIcon').classList.toggle('rotate', archiveVisible);
            });

            document.getElementById('clearArchiveBtn').addEventListener('click', clearArchive);

            // nav buttons (works for both modes)
            document.getElementById('prevBtn').addEventListener('click', () => navigate(-1));
            document.getElementById('nextBtn').addEventListener('click', () => navigate(1));

            // toggle view by clicking 📅
            document.getElementById('toggleViewIcon').addEventListener('click', toggleViewMode);
        });
    })();
</script>
</body>
</html>
