<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>to‑do · multi‑select</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 0 0 20px 0;
        }

        .app {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 32px 32px 28px 28px;
            box-shadow: 0 15px 30px rgba(0, 15, 30, 0.1);
            margin: 12px 12px 20px 12px;
            padding: 1.5rem 1rem 1.8rem 1rem;
        }

        /* header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding: 0 0.2rem;
        }

        .title-area h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(145deg, #1f3449, #2b4f74);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .plus-btn {
            width: 60px;
            height: 60px;
            background: #1f3449;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.6rem;
            font-weight: 300;
            cursor: pointer;
            box-shadow: 0 10px 18px rgba(25, 55, 80, 0.25);
            border: none;
            transition: 0.1s;
        }

        .plus-btn:active {
            background: #2b4f74;
            transform: scale(0.96);
        }

        /* stats cards */
        .stats-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 1.8rem;
        }

        .stat-card {
            flex: 1 1 100px;
            background: #ecf3fa;
            border-radius: 30px;
            padding: 0.8rem 0.2rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e3b5a;
            border: 1px solid #bed3ea;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-card span:first-child {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1d3f62;
        }

        /* active task list */
        .section-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin: 0 0 0.6rem 0.5rem;
            color: #1e3b5a;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .section-title i {
            color: #e67e22;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 1.8rem;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .task-item {
            background: white;
            border: 1px solid #dee9f2;
            border-radius: 60px;
            padding: 0.4rem 0.4rem 0.4rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .task-check {
            width: 38px;
            height: 38px;
            border-radius: 30px;
            border: 2.5px solid #b6cde5;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .task-check.completed {
            background: #1f8b4c;
            border-color: #0f682f;
            color: white;
        }

        .task-content {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            color: #1a3146;
            word-break: break-word;
            padding: 0.4rem 0;
        }

        .date-badge {
            font-size: 0.7rem;
            background: #eaf1fa;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            margin-left: 0.5rem;
            font-weight: 400;
            color: #2b4f74;
            white-space: nowrap;
        }

        .reminder-badge {
            font-size: 0.7rem;
            background: #fff0d9;
            padding: 0.25rem 0.6rem;
            border-radius: 30px;
            margin-left: 0.3rem;
            color: #b45f1b;
            font-weight: 500;
        }

        .task-delete {
            background: transparent;
            border: none;
            color: #9bb3cf;
            font-size: 1.4rem;
            padding: 0.6rem 1rem 0.6rem 0.2rem;
            cursor: pointer;
        }

        .empty-message {
            text-align: center;
            color: #8ba3c2;
            padding: 1.8rem 1rem;
            background: #f6faff;
            border-radius: 50px;
            font-size: 0.95rem;
        }

        /* archive */
        .archive-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #e3ecf5;
            padding: 1rem 1.2rem;
            border-radius: 40px;
            margin: 1rem 0 0.6rem;
            border: 1px solid #c5d8f0;
            cursor: pointer;
            font-weight: 600;
            color: #1f3f60;
        }

        .archive-header i {
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .archive-header .rotate {
            transform: rotate(90deg);
        }

        .archive-list {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .archive-list.visible {
            display: flex;
        }

        .archive-item {
            background: #f1f7fd;
            border: 1px dashed #adc5e2;
            border-radius: 40px;
            padding: 0.7rem 1.2rem;
            display: flex;
            align-items: center;
            opacity: 0.85;
        }

        .archive-item .task-content {
            text-decoration: line-through;
            color: #4f6f91;
        }

        /* calendar card */
        .calendar-card {
            background: white;
            border-radius: 32px;
            padding: 1.2rem 0.8rem 1rem;
            border: 1px solid #dae6f2;
            box-shadow: 0 6px 14px rgba(0,0,0,0.02);
            margin: 0.5rem 0 0.8rem;
        }

        .selected-date-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f2f8ff;
            padding: 0.8rem 1.2rem;
            border-radius: 50px;
            margin-bottom: 1rem;
            font-weight: 600;
            color: #1e3f60;
        }

        .selected-date-row span:last-child {
            background: white;
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            font-size: 1rem;
        }

        .cal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
            padding: 0 0.2rem;
        }

        .cal-month {
            font-weight: 700;
            font-size: 1.3rem;
            color: #1d3f62;
        }

        .cal-nav button {
            background: transparent;
            border: 1px solid #c9d9ee;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            color: #1e3f60;
            margin-left: 0.3rem;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            color: #38658f;
            margin-bottom: 0.3rem;
            font-size: 0.8rem;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }

        .cal-cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f9fcff;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e3c5c;
            border: 1px solid transparent;
            cursor: pointer;
            padding: 4px 0;
            transition: background-color 0.1s;
        }

        .cal-cell.has-tasks {
            background: #e1effb;
            border-color: #9bbde0;
        }

        .cal-cell.today {
            background: #2b4f74;
            color: white;
            font-weight: 700;
        }

        .cal-cell.selected-main {
            background: #ffe1b3;
            border: 2px solid #e67e22;
            color: #1d2b3a;
            font-weight: 700;
        }

        .cal-cell.multi-selected {
            border: 3px dashed #e67e22;
            background: #fff2e0;
            font-weight: 600;
        }

        .task-dots {
            font-size: 0.6rem;
            letter-spacing: 1.5px;
            color: #2b4f74;
            margin-top: 2px;
        }

        .today .task-dots {
            color: #ffddb0;
        }

        /* modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1rem;
        }

        .modal-card {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 48px;
            padding: 2rem 1.5rem;
            box-shadow: 0 30px 50px rgba(0,10,30,0.2);
        }

        .modal-date {
            font-weight: 700;
            font-size: 1.5rem;
            color: #1d3f62;
            background: #e9f2fc;
            padding: 0.8rem 1rem;
            border-radius: 60px;
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .modal-input {
            padding: 1.2rem 1.5rem;
            border: 2px solid #c9d9ee;
            border-radius: 60px;
            font-size: 1rem;
            width: 100%;
            margin-bottom: 1rem;
        }

        .time-picker-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            background: #f2f8ff;
            padding: 0.8rem 1.2rem;
            border-radius: 60px;
        }

        .time-picker-row label {
            font-weight: 600;
            color: #1e3f60;
        }

        .time-picker-row input {
            flex: 1;
            padding: 0.7rem;
            border: 1px solid #bed3ea;
            border-radius: 40px;
            font-size: 1rem;
        }

        .modal-actions {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
        }

        .modal-btn {
            background: #1f3449;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            flex: 1;
        }

        .modal-btn.cancel {
            background: #e2eaf3;
            color: #1d3f62;
        }

        .footer-btn {
            background: transparent;
            border: 1.5px solid #c4d6ec;
            padding: 0.9rem 1.8rem;
            border-radius: 60px;
            color: #1d4569;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app">
    <div class="header">
        <div class="title-area"><h1>TO-DO</h1></div>
        <div class="plus-btn" id="plusBtn">+</div>
    </div>

    <div class="stats-row">
        <div class="stat-card"><span id="activeCount">0</span> active</div>
        <div class="stat-card"><span id="completedCount">0</span> done</div>
        <div class="stat-card"><span id="monthCount">0</span> this month</div>
    </div>

    <div class="section-title"><i class="fas fa-list-check"></i> <span id="selectedDateHeading"></span></div>
    <div id="activeTaskList" class="task-list"></div>

    <div class="archive-header" id="archiveToggle">
        <i class="fas fa-archive" id="archiveIcon"></i> COMPLETED <span id="archiveCount">(0)</span>
    </div>
    <div id="archiveListContainer" class="archive-list"></div>

    <div class="calendar-card">
        <div class="selected-date-row">
            <span>📅</span>
            <span id="selectedDateDisplay"></span>
        </div>
        <div class="cal-header">
            <span class="cal-month" id="monthYearDisplay"></span>
            <div class="cal-nav">
                <button id="prevBtn">←</button>
                <button id="nextBtn">→</button>
            </div>
        </div>
        <div class="weekdays"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>
        <div id="calendarGrid" class="month-grid"></div>
    </div>

    <button class="footer-btn" id="clearArchiveBtn">🗑️ CLEAR ARCHIVE</button>

    <!-- modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <div class="modal-date" id="modalDate"></div>
            <input type="text" class="modal-input" id="modalTaskInput" placeholder="task description" autofocus>
            <div class="time-picker-row">
                <label>⏰</label>
                <input type="time" id="modalTimeInput" value="09:00">
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
                <button class="modal-btn" id="modalAdd">ADD</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- data ----------
        let activeTasks = [];
        let completedTasks = [];

        const STORAGE_KEY = 'todo_multiselect_v2';
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const data = JSON.parse(stored);
                activeTasks = data.active || [];
                completedTasks = data.completed || [];
            } catch (e) { resetSample(); }
        } else {
            resetSample();
        }

        function resetSample() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth()+1).padStart(2,'0');
            const day = String(d.getDate()).padStart(2,'0');
            activeTasks = [
                { id: 'a1', text: 'cbse syllabus', date: `${y}-${m}-05`, time: '10:00' },
                { id: 'a2', text: 'yoga / stretch', date: `${y}-${m}-${day}`, time: '07:30' },
                { id: 'a3', text: 'team meeting', date: `${y}-${m}-12`, time: '14:00' },
                { id: 'a4', text: 'call electrician', date: `${y}-${m}-15`, time: '16:30' },
            ];
            completedTasks = [
                { id: 'c1', text: 'read 30 pages', date: `${y}-${m}-${day}`, time: '21:00' },
                { id: 'c2', text: 'buy groceries', date: `${y}-${m}-07`, time: '18:00' },
            ];
        }

        // state
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        const today = new Date();
        let mainSelectedDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        
        // multi-select set (persistent until used or cleared)
        let multiSelectedDates = new Set();

        let archiveVisible = false;
        let longPressTimer = null;
        const LONG_PRESS_DELAY = 400; // ms

        // helpers
        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ active: activeTasks, completed: completedTasks }));
        }

        function formatDisplay(iso) {
            const [y,m,d] = iso.split('-');
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
        }

        function activeCountForDate(dateStr) {
            return activeTasks.filter(t => t.date === dateStr).length;
        }

        // feedback for reminder (vibrate + beep)
        function playReminderFeedback() {
            if (navigator.vibrate) navigator.vibrate(80);
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 880;
                gain.gain.value = 0.2;
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch (e) {}
        }

        // check for reminders (runs every minute)
        function checkReminders() {
            const now = new Date();
            const currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            
            activeTasks.forEach(task => {
                if (task.date === todayStr && task.time === currentTime) {
                    playReminderFeedback();
                    // optional: show alert or just beep/vibrate
                }
            });
        }

        // run reminder check every 60 seconds
        setInterval(checkReminders, 60000);
        // also check immediately on load
        setTimeout(checkReminders, 2000);

        // --- render calendar ---
        function renderCalendar() {
            const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            document.getElementById('monthYearDisplay').innerText = `${monthNames[currentMonth]} ${currentYear}`;
            document.getElementById('selectedDateDisplay').innerText = formatDisplay(mainSelectedDate);
            document.getElementById('selectedDateHeading').innerText = mainSelectedDate;

            const grid = document.getElementById('calendarGrid');
            renderMonth(grid);
            attachCellEvents();
        }

        function renderMonth(container) {
            container.className = 'month-grid';
            const firstDay = new Date(currentYear, currentMonth, 1).getDay(); // 0 sun
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const todayDate = new Date();
            const isCurrentMonth = (todayDate.getFullYear() === currentYear && todayDate.getMonth() === currentMonth);

            let html = '';
            for (let i = 0; i < 42; i++) {
                const dayNum = i - firstDay + 1;
                if (dayNum > 0 && dayNum <= daysInMonth) {
                    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
                    const count = activeCountForDate(dateStr);
                    const isToday = isCurrentMonth && dayNum === todayDate.getDate();
                    const isMainSelected = (dateStr === mainSelectedDate);
                    const isMulti = multiSelectedDates.has(dateStr);
                    
                    let cls = 'cal-cell';
                    if (count > 0) cls += ' has-tasks';
                    if (isToday) cls += ' today';
                    if (isMainSelected) cls += ' selected-main';
                    if (isMulti) cls += ' multi-selected';

                    const dots = '●'.repeat(Math.min(count, 5));
                    html += `<div class="${cls}" data-date="${dateStr}"><span>${dayNum}</span><span class="task-dots">${dots}</span></div>`;
                } else {
                    html += `<div class="cal-cell" style="background:transparent; pointer-events:none;"></div>`;
                }
            }
            container.innerHTML = html;
        }

        function attachCellEvents() {
            document.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
                // --- click: set main selected, but keep multi-selected intact ---
                cell.addEventListener('click', (e) => {
                    const date = cell.dataset.date;
                    if (date) {
                        mainSelectedDate = date;
                        renderCalendar();  // re-render to update main highlight
                        renderActiveList(); // show tasks for main selected (but multi dates still affect list)
                    }
                });

                // --- long press: toggle multi-select ---
                cell.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const date = cell.dataset.date;
                    longPressTimer = setTimeout(() => {
                        // toggle this date in multi-select set
                        if (multiSelectedDates.has(date)) {
                            multiSelectedDates.delete(date);
                        } else {
                            multiSelectedDates.add(date);
                        }
                        // short vibration feedback
                        if (navigator.vibrate) navigator.vibrate(30);
                        renderCalendar();    // update border
                        renderActiveList();  // update task list (shows all multi dates)
                        longPressTimer = null;
                    }, LONG_PRESS_DELAY);
                });

                cell.addEventListener('touchend', () => {
                    if (longPressTimer) {
                        clearTimeout(longPressTimer);
                        longPressTimer = null;
                    }
                });
                cell.addEventListener('touchmove', () => {
                    if (longPressTimer) {
                        clearTimeout(longPressTimer);
                        longPressTimer = null;
                    }
                });

                // mouse equivalents for testing
                cell.addEventListener('mousedown', (e) => {
                    const date = cell.dataset.date;
                    longPressTimer = setTimeout(() => {
                        if (multiSelectedDates.has(date)) {
                            multiSelectedDates.delete(date);
                        } else {
                            multiSelectedDates.add(date);
                        }
                        if (navigator.vibrate) navigator.vibrate(30);
                        renderCalendar();
                        renderActiveList();
                        longPressTimer = null;
                    }, LONG_PRESS_DELAY);
                });
                cell.addEventListener('mouseup', () => { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } });
                cell.addEventListener('mouseleave', () => { if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; } });
            });
        }

        // render active tasks: show tasks from all multi-selected dates, if any; otherwise mainSelectedDate
        function renderActiveList() {
            const container = document.getElementById('activeTaskList');
            const datesToShow = multiSelectedDates.size > 0 ? Array.from(multiSelectedDates) : [mainSelectedDate];
            
            const filtered = activeTasks.filter(t => datesToShow.includes(t.date));
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-message">✨ no active tasks for selected date(s)</div>`;
            } else {
                let html = '';
                filtered.forEach(t => {
                    const timeDisplay = t.time ? ` ⏰ ${t.time}` : '';
                    html += `
                        <div class="task-item" data-id="${t.id}">
                            <div class="task-check" data-id="${t.id}" data-action="toggle"></div>
                            <div class="task-content">${escapeHtml(t.text)}${timeDisplay}<span class="date-badge">${t.date}</span></div>
                            <button class="task-delete" data-id="${t.id}" data-action="delete"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }
            attachActiveListeners();
            updateStats();
        }

        function renderArchive() {
            const container = document.getElementById('archiveListContainer');
            document.getElementById('archiveCount').innerText = `(${completedTasks.length})`;
            if (completedTasks.length === 0) {
                container.innerHTML = `<div class="empty-message" style="padding:1rem;">no completed tasks</div>`;
            } else {
                let html = '';
                completedTasks.slice().reverse().forEach(t => {
                    const timeDisplay = t.time ? ` ⏰ ${t.time}` : '';
                    html += `<div class="archive-item"><div class="task-content">${escapeHtml(t.text)}${timeDisplay}<span class="date-badge">${t.date}</span></div></div>`;
                });
                container.innerHTML = html;
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>"]/g, m => {
                if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; if (m === '"') return '&quot;';
                return m;
            });
        }

        function attachActiveListeners() {
            document.querySelectorAll('[data-action="toggle"]').forEach(el => {
                el.removeEventListener('click', handleToggle);
                el.addEventListener('click', handleToggle);
            });
            document.querySelectorAll('[data-action="delete"]').forEach(el => {
                el.removeEventListener('click', handleDelete);
                el.addEventListener('click', handleDelete);
            });
        }

        function handleToggle(e) {
            const id = e.currentTarget.dataset.id;
            const idx = activeTasks.findIndex(t => t.id === id);
            if (idx !== -1) {
                const [moved] = activeTasks.splice(idx, 1);
                completedTasks.push(moved);
                save();
                // completion feedback
                if (navigator.vibrate) navigator.vibrate(50);
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.frequency.value = 800;
                    gain.gain.value = 0.2;
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } catch (e) {}
                
                renderCalendar();
                renderActiveList();
                renderArchive();
                updateStats();
            }
        }

        function handleDelete(e) {
            const id = e.currentTarget.dataset.id;
            activeTasks = activeTasks.filter(t => t.id !== id);
            save();
            renderCalendar();
            renderActiveList();
            updateStats();
        }

        function updateStats() {
            document.getElementById('activeCount').innerText = activeTasks.length;
            document.getElementById('completedCount').innerText = completedTasks.length;
            const monthStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
            const monthDone = completedTasks.filter(t => t.date.startsWith(monthStr)).length;
            document.getElementById('monthCount').innerText = monthDone;
        }

        // modal
        function openModal() {
            // show the main selected date in modal (but we'll add to multi set if any)
            document.getElementById('modalDate').innerText = `📅 ${mainSelectedDate}`;
            document.getElementById('modalTaskInput').value = '';
            document.getElementById('modalTimeInput').value = '09:00';
            document.getElementById('modalOverlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modalTaskInput').focus(), 100);
        }
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }
        function addTaskFromModal() {
            const inp = document.getElementById('modalTaskInput');
            const text = inp.value.trim();
            if (!text) { alert('enter task'); return; }
            const time = document.getElementById('modalTimeInput').value;

            // target dates: if multiSelectedDates not empty, use those; otherwise use mainSelectedDate
            const targetDates = multiSelectedDates.size > 0 ? Array.from(multiSelectedDates) : [mainSelectedDate];
            
            targetDates.forEach(date => {
                activeTasks.push({
                    id: Date.now() + '-' + Math.random().toString(36).substr(2, 6) + '-' + date,
                    text: text,
                    date: date,
                    time: time || null,
                });
            });

            save();
            inp.value = '';
            closeModal();
            // after adding, keep multi-selected as they were (they remain)
            renderCalendar();
            renderActiveList();
        }

        function prev() {
            if (currentMonth === 0) { currentMonth = 11; currentYear--; }
            else currentMonth--;
            renderCalendar();
            renderActiveList();
        }
        function next() {
            if (currentMonth === 11) { currentMonth = 0; currentYear++; }
            else currentMonth++;
            renderCalendar();
            renderActiveList();
        }

        function clearArchive() {
            if (completedTasks.length && confirm('Permanently delete all completed tasks?')) {
                completedTasks = [];
                save();
                renderArchive();
                updateStats();
            }
        }

        // init
        window.addEventListener('DOMContentLoaded', () => {
            renderCalendar();
            renderActiveList();
            renderArchive();
            updateStats();

            document.getElementById('plusBtn').addEventListener('click', openModal);
            document.getElementById('modalAdd').addEventListener('click', addTaskFromModal);
            document.getElementById('modalCancel').addEventListener('click', closeModal);
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === document.getElementById('modalOverlay')) closeModal();
            });
            document.getElementById('modalTaskInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTaskFromModal();
            });

            document.getElementById('archiveToggle').addEventListener('click', () => {
                archiveVisible = !archiveVisible;
                document.getElementById('archiveListContainer').classList.toggle('visible', archiveVisible);
                document.getElementById('archiveIcon').classList.toggle('rotate', archiveVisible);
            });

            document.getElementById('clearArchiveBtn').addEventListener('click', clearArchive);
            document.getElementById('prevBtn').addEventListener('click', prev);
            document.getElementById('nextBtn').addEventListener('click', next);
        });
    })();
</script>
</body>
</html>
