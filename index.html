<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>to‑do · compact · no‑scroll</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 6px;
        }

        /* app container fits exactly in one viewport on a typical mobile (600-700px height) */
        .app {
            max-width: 420px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 12px 24px rgba(0, 15, 30, 0.12);
            padding: 0.9rem 0.8rem 0.8rem 0.8rem;
            display: flex;
            flex-direction: column;
            max-height: 95vh;        /* ensure it never overflows vertically */
            height: auto;
            overflow: hidden;         /* prevent outer scroll */
        }

        /* header smaller */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.7rem;
            padding: 0 0.1rem;
        }

        .title-area h1 {
            font-size: 1.9rem;        /* reduced from 2.4rem */
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(145deg, #1f3449, #2b4f74);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .plus-btn {
            width: 48px;               /* smaller */
            height: 48px;
            background: #1f3449;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.2rem;
            font-weight: 300;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(25, 55, 80, 0.2);
            border: none;
            transition: 0.1s;
            -webkit-user-select: none;
            user-select: none;
        }

        .plus-btn:active {
            background: #2b4f74;
            transform: scale(0.96);
        }

        /* active task area limited height */
        .section-title {
            font-weight: 700;
            font-size: 1rem;
            margin: 0 0 0.3rem 0.3rem;
            color: #1e3b5a;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            margin-bottom: 0.7rem;
            max-height: 140px;          /* limited to show ~3 tasks without scroll */
            overflow-y: auto;
            padding-right: 2px;
            border-radius: 16px;
        }

        .task-item {
            background: white;
            border: 1px solid #dee9f2;
            border-radius: 40px;
            padding: 0.2rem 0.2rem 0.2rem 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.02);
            min-height: 48px;
        }

        .task-check {
            width: 32px;
            height: 32px;
            border-radius: 30px;
            border: 2.2px solid #b6cde5;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .task-check.completed {
            background: #1f8b4c;
            border-color: #0f682f;
            color: white;
        }

        .task-content {
            flex: 1;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1a3146;
            word-break: break-word;
            padding: 0.2rem 0;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 0.2rem 0.4rem;
            margin-top: 0.1rem;
        }

        .badge {
            font-size: 0.6rem;
            background: #eaf1fa;
            padding: 0.15rem 0.5rem;
            border-radius: 30px;
            font-weight: 500;
            color: #2b4f74;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 0.1rem;
        }

        .badge.reminder {
            background: #fff0db;
            color: #b45b0f;
        }

        .badge.repeat {
            background: #d9ecff;
            color: #0369a1;
        }

        .date-badge {
            font-size: 0.6rem;
            background: #eaf1fa;
            padding: 0.15rem 0.5rem;
            border-radius: 30px;
            margin-left: 0.3rem;
            font-weight: 400;
            color: #2b4f74;
            white-space: nowrap;
        }

        .task-delete {
            background: transparent;
            border: none;
            color: #9bb3cf;
            font-size: 1.1rem;
            padding: 0.4rem 0.6rem 0.4rem 0.2rem;
            cursor: pointer;
        }

        .task-delete:active {
            color: #c03d2e;
        }

        .empty-message {
            text-align: center;
            color: #8ba3c2;
            padding: 0.8rem 0.5rem;
            background: #f6faff;
            border-radius: 40px;
            font-size: 0.85rem;
        }

        /* archive more compact */
        .archive-header {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: #e3ecf5;
            padding: 0.6rem 1rem;
            border-radius: 36px;
            margin: 0.3rem 0 0.3rem;
            border: 1px solid #c5d8f0;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1f3f60;
        }

        .archive-header i {
            font-size: 0.9rem;
            transition: transform 0.2s;
        }

        .archive-header .rotate {
            transform: rotate(90deg);
        }

        .archive-list {
            display: none;
            flex-direction: column;
            gap: 0.3rem;
            margin-bottom: 0.5rem;
            max-height: 110px;          /* compact archive */
            overflow-y: auto;
            padding-right: 2px;
        }

        .archive-list.visible {
            display: flex;
        }

        .archive-item {
            background: #f1f7fd;
            border: 1px dashed #adc5e2;
            border-radius: 32px;
            padding: 0.4rem 0.8rem 0.4rem 1rem;
            display: flex;
            align-items: center;
            opacity: 0.8;
        }

        .archive-item .task-content {
            text-decoration: line-through;
            color: #4f6f91;
            flex: 1;
            font-size: 0.85rem;
        }

        .archive-delete-btn {
            background: transparent;
            border: none;
            color: #c03d2e;
            font-size: 1rem;
            padding: 0.2rem 0.2rem 0.2rem 0.6rem;
            cursor: pointer;
            opacity: 0.7;
        }

        /* calendar card smaller */
        .calendar-card {
            background: white;
            border-radius: 24px;
            padding: 0.6rem 0.5rem 0.4rem;
            border: 1px solid #dae6f2;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            margin: 0.2rem 0 0.3rem;
            touch-action: pan-y pinch-zoom;
        }

        .selected-date-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f2f8ff;
            padding: 0.4rem 0.8rem;
            border-radius: 40px;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: #1e3f60;
            cursor: pointer;
        }

        .selected-date-row span:last-child {
            background: white;
            padding: 0.2rem 1rem;
            border-radius: 30px;
            font-size: 0.85rem;
        }

        .cal-header {
            margin-bottom: 0.3rem;
        }

        .cal-month {
            font-weight: 700;
            font-size: 1.2rem;
            color: #1d3f62;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            color: #38658f;
            margin-bottom: 0.2rem;
            font-size: 0.7rem;
        }

        .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .cal-cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f9fcff;
            border-radius: 24px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e3c5c;
            border: 1px solid transparent;
            cursor: pointer;
            padding: 2px 0;
        }

        .cal-cell.has-tasks {
            background: #e1effb;
            border-color: #9bbde0;
        }

        .cal-cell.today {
            background: #2b4f74;
            color: white;
            font-weight: 700;
        }

        .cal-cell.selected {
            background: #ffe1b3;
            border: 2px solid #e67e22;
            color: #1d2b3a;
            font-weight: 700;
        }

        .task-dots {
            font-size: 0.5rem;
            letter-spacing: 1px;
            color: #2b4f74;
            margin-top: 1px;
        }

        .today .task-dots {
            color: #ffddb0;
        }

        /* modal still normal size */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1rem;
        }

        .modal-card {
            background: white;
            width: 100%;
            max-width: 380px;
            border-radius: 40px;
            padding: 1.5rem 1.2rem;
            box-shadow: 0 30px 50px rgba(0,10,30,0.2);
        }

        .modal-date {
            font-weight: 700;
            font-size: 1.4rem;
            color: #1d3f62;
            background: #e9f2fc;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            text-align: center;
            margin-bottom: 1rem;
        }

        .modal-input {
            padding: 1rem 1.2rem;
            border: 2px solid #c9d9ee;
            border-radius: 50px;
            font-size: 0.95rem;
            width: 100%;
            margin-bottom: 1rem;
        }

        .options-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .option-pill {
            flex: 1 0 auto;
            background: #f0f5fd;
            border-radius: 36px;
            padding: 0.5rem 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: #1e3f60;
        }

        .option-pill.selected {
            background: #fff1dc;
            border-color: #e67e22;
        }

        .time-picker-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
            background: #f0f5fd;
            padding: 0.5rem 1rem;
            border-radius: 50px;
        }

        .time-picker-row input[type="time"] {
            border: none;
            background: transparent;
            font-size: 0.95rem;
            font-weight: 600;
            color: #1d3f62;
            outline: none;
            flex: 1;
        }

        .modal-actions {
            display: flex;
            gap: 0.6rem;
        }

        .modal-btn {
            background: #1f3449;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            flex: 1;
        }

        .modal-btn.cancel {
            background: #e2eaf3;
            color: #1d3f62;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app">
    <!-- smaller header -->
    <div class="header">
        <div class="title-area"><h1>TO-DO</h1></div>
        <div class="plus-btn" id="plusBtn" aria-label="add task">+</div>
    </div>

    <!-- active tasks compact -->
    <div class="section-title"><i class="fas fa-list-check"></i> <span id="selectedDateHeading">2026-03-15</span></div>
    <div id="activeTaskList" class="task-list"></div>

    <!-- archive compact -->
    <div class="archive-header" id="archiveToggle">
        <i class="fas fa-archive" id="archiveIcon"></i> COMPLETED <span id="archiveCount">(0)</span>
    </div>
    <div id="archiveListContainer" class="archive-list"></div>

    <!-- calendar card (smaller) -->
    <div class="calendar-card" id="calendarSwipeArea">
        <div class="selected-date-row" id="todayTap">
            <span>📅</span>
            <span id="selectedDateDisplay">15 Mar 2026</span>
        </div>
        <div class="cal-header">
            <span class="cal-month" id="monthYearDisplay">March 2026</span>
        </div>
        <div class="weekdays">
            <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
        </div>
        <div id="calendarGrid" class="month-grid"></div>
    </div>

    <!-- modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <div class="modal-date" id="modalDate">📅 2026-03-15</div>
            <input type="text" class="modal-input" id="modalTaskInput" placeholder="e.g., buy milk" autofocus>
            
            <div class="options-row">
                <div class="option-pill" id="repeatNone" data-repeat="none"><i class="far fa-circle"></i> None</div>
                <div class="option-pill" id="repeatDaily" data-repeat="daily"><i class="fas fa-sun"></i> Daily</div>
                <div class="option-pill" id="repeatWeekly" data-repeat="weekly"><i class="fas fa-calendar-week"></i> Weekly</div>
            </div>

            <div class="time-picker-row">
                <i class="fas fa-clock"></i>
                <input type="time" id="reminderTime" value="09:00">
                <span class="reminder-badge" id="reminderToggle" style="cursor:pointer;">🔔</span>
            </div>

            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
                <button class="modal-btn" id="modalAdd">ADD</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- data with reminder & repeat fields
        let activeTasks = [];
        let completedTasks = [];

        const STORAGE_KEY = 'mobile_todo_reminder_v2';
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const data = JSON.parse(stored);
                activeTasks = data.active || [];
                completedTasks = data.completed || [];
            } catch (e) { resetSample(); }
        } else {
            resetSample();
        }

        function resetSample() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth()+1).padStart(2,'0');
            const d = String(today.getDate()).padStart(2,'0');
            activeTasks = [
                { id: 'a1', text: 'cbse syllabus', date: `${y}-${m}-05`, repeat: 'none', reminder: null },
                { id: 'a2', text: 'yoga / stretch', date: `${y}-${m}-${d}`, repeat: 'daily', reminder: '08:00' },
                { id: 'a3', text: 'team meeting', date: `${y}-${m}-12`, repeat: 'weekly', reminder: '14:30' },
                { id: 'a4', text: 'call electrician', date: `${y}-${m}-15`, repeat: 'none', reminder: null },
            ];
            completedTasks = [
                { id: 'c1', text: 'read 30 pages', date: `${y}-${m}-${d}`, repeat: 'none', reminder: null },
                { id: 'c2', text: 'buy groceries', date: `${y}-${m}-07`, repeat: 'none', reminder: null },
            ];
        }

        // state
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let selectedDate = (() => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        })();

        let archiveVisible = false;
        let longPressTimer = null;
        const LONG_PRESS_DELAY = 500;
        let selectedRepeat = 'none';
        let reminderInterval = null;
        const SOUND_DURATION = 3000;

        function playCompleteFeedback() {
            if (navigator.vibrate) navigator.vibrate(30);
            beep(600, 120);
        }

        function playLongBeep() {
            if (navigator.vibrate) navigator.vibrate(2000);
            beep(880, SOUND_DURATION);
        }

        function beep(freq, durationMs) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.value = freq;
                gainNode.gain.value = 0.2;
                oscillator.connect(gainNode).connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + durationMs/1000);
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch (e) { }
        }

        function playLongPressHint() {
            if (navigator.vibrate) navigator.vibrate(20);
        }

        function checkReminders() {
            const now = new Date();
            const currentIso = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            activeTasks.forEach(task => {
                if (task.reminder && task.date === currentIso && task.reminder === currentTime) {
                    playLongBeep();
                }
            });
        }

        function startReminderService() {
            if (reminderInterval) clearInterval(reminderInterval);
            reminderInterval = setInterval(checkReminders, 30000);
            checkReminders();
        }

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ active: activeTasks, completed: completedTasks }));
        }

        function formatDisplay(iso) {
            const [y,m,d] = iso.split('-');
            const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            return `${parseInt(d)} ${monthNames[parseInt(m)-1]} ${y}`;
        }

        function activeCountForDate(dateStr) {
            return activeTasks.filter(t => t.date === dateStr).length;
        }

        function renderCalendar() {
            const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            document.getElementById('monthYearDisplay').innerText = `${monthNames[currentMonth]} ${currentYear}`;
            document.getElementById('selectedDateDisplay').innerText = formatDisplay(selectedDate);
            document.getElementById('selectedDateHeading').innerText = selectedDate;

            const grid = document.getElementById('calendarGrid');
            renderMonth(grid);

            document.querySelectorAll('.cal-cell[data-date]').forEach(cell => {
                cell.removeEventListener('click', handleCellClick);
                cell.removeEventListener('touchstart', handleTouchStartLong);
                cell.removeEventListener('touchend', handleTouchEndLong);
                cell.removeEventListener('touchcancel', handleTouchCancelLong);
                cell.removeEventListener('touchmove', handleTouchMoveLong);
                cell.addEventListener('click', handleCellClick);
                cell.addEventListener('touchstart', handleTouchStartLong, { passive: true });
                cell.addEventListener('touchend', handleTouchEndLong);
                cell.addEventListener('touchcancel', handleTouchCancelLong);
                cell.addEventListener('touchmove', handleTouchMoveLong, { passive: true });
            });
        }

        function handleCellClick(e) {
            const dateStr = e.currentTarget.dataset.date;
            if (dateStr) {
                selectedDate = dateStr;
                renderCalendar();
                renderActiveList();
            }
        }

        function handleTouchStartLong(e) {
            const cell = e.currentTarget;
            const dateStr = cell.dataset.date;
            if (!dateStr) return;
            cell.classList.add('long-press-hint');
            longPressTimer = setTimeout(() => {
                playLongPressHint();
                selectedDate = dateStr;
                renderCalendar();
                renderActiveList();
                openModal();
                if (longPressTimer) clearTimeout(longPressTimer);
                longPressTimer = null;
                cell.classList.remove('long-press-hint');
            }, LONG_PRESS_DELAY);
        }

        function handleTouchEndLong(e) {
            const cell = e.currentTarget;
            cell.classList.remove('long-press-hint');
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        }

        function handleTouchCancelLong(e) {
            const cell = e.currentTarget;
            cell.classList.remove('long-press-hint');
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        }

        function handleTouchMoveLong(e) {
            const cell = e.currentTarget;
            cell.classList.remove('long-press-hint');
            if (longPressTimer) {
                clearTimeout(longPressTimer);
                longPressTimer = null;
            }
        }

        function renderMonth(container) {
            container.className = 'month-grid';
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();
            const isCurrentMonth = (today.getFullYear() === currentYear && today.getMonth() === currentMonth);

            let html = '';
            for (let i = 0; i < 42; i++) {
                const dayNum = i - firstDay + 1;
                if (dayNum > 0 && dayNum <= daysInMonth) {
                    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
                    const count = activeCountForDate(dateStr);
                    const isToday = isCurrentMonth && dayNum === today.getDate();
                    const isSelected = (dateStr === selectedDate);
                    let cls = 'cal-cell';
                    if (count > 0) cls += ' has-tasks';
                    if (isToday) cls += ' today';
                    if (isSelected) cls += ' selected';

                    const dots = '●'.repeat(Math.min(count, 5));
                    html += `<div class="${cls}" data-date="${dateStr}"><span>${dayNum}</span><span class="task-dots">${dots}</span></div>`;
                } else {
                    html += `<div class="cal-cell" style="background:transparent; pointer-events:none;"></div>`;
                }
            }
            container.innerHTML = html;
        }

        function renderActiveList() {
            const container = document.getElementById('activeTaskList');
            const filtered = activeTasks.filter(t => t.date === selectedDate);
            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-message">✨ no tasks</div>`;
            } else {
                let html = '';
                filtered.forEach(t => {
                    const repeatIcon = t.repeat === 'daily' ? '<i class="fas fa-sun"></i>' : (t.repeat === 'weekly' ? '<i class="fas fa-calendar-week"></i>' : '');
                    const reminderHtml = t.reminder ? `<span class="badge reminder"><i class="fas fa-clock"></i> ${t.reminder}</span>` : '';
                    html += `
                        <div class="task-item" data-id="${t.id}">
                            <div class="task-check" data-id="${t.id}" data-action="toggle"></div>
                            <div class="task-content">
                                ${escapeHtml(t.text)}
                                <div class="task-meta">
                                    ${t.repeat !== 'none' ? `<span class="badge repeat">${repeatIcon} ${t.repeat}</span>` : ''}
                                    ${reminderHtml}
                                </div>
                            </div>
                            <button class="task-delete" data-id="${t.id}" data-action="delete"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }
            attachActiveListeners();
        }

        function renderArchive() {
            const container = document.getElementById('archiveListContainer');
            document.getElementById('archiveCount').innerText = `(${completedTasks.length})`;
            if (completedTasks.length === 0) {
                container.innerHTML = `<div class="empty-message" style="padding:0.5rem;">no completed</div>`;
            } else {
                let html = '';
                completedTasks.slice().reverse().forEach(t => {
                    html += `
                        <div class="archive-item" data-archive-id="${t.id}">
                            <div class="task-content">${escapeHtml(t.text)}</div>
                            <button class="archive-delete-btn" data-archive-id="${t.id}"><i class="fas fa-times-circle"></i></button>
                        </div>
                    `;
                });
                container.innerHTML = html;
                container.querySelectorAll('.archive-delete-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.archiveId;
                        completedTasks = completedTasks.filter(t => t.id !== id);
                        save();
                        renderArchive();
                        renderCalendar();
                    });
                });
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>"]/g, m => {
                if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; if (m === '"') return '&quot;';
                return m;
            });
        }

        function attachActiveListeners() {
            document.querySelectorAll('[data-action="toggle"]').forEach(el => {
                el.removeEventListener('click', handleToggle);
                el.addEventListener('click', handleToggle);
            });
            document.querySelectorAll('[data-action="delete"]').forEach(el => {
                el.removeEventListener('click', handleDelete);
                el.addEventListener('click', handleDelete);
            });
        }

        function handleToggle(e) {
            const id = e.currentTarget.dataset.id;
            const idx = activeTasks.findIndex(t => t.id === id);
            if (idx !== -1) {
                const [moved] = activeTasks.splice(idx, 1);
                completedTasks.push(moved);
                playCompleteFeedback();
                save();
                renderCalendar();
                renderActiveList();
                renderArchive();
            }
        }

        function handleDelete(e) {
            const id = e.currentTarget.dataset.id;
            activeTasks = activeTasks.filter(t => t.id !== id);
            save();
            renderCalendar();
            renderActiveList();
        }

        function openModal() {
            document.getElementById('modalDate').innerText = `📅 ${selectedDate}`;
            document.getElementById('modalTaskInput').value = '';
            selectedRepeat = 'none';
            updateRepeatUI();
            document.getElementById('reminderTime').value = '09:00';
            document.getElementById('modalOverlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modalTaskInput').focus(), 100);
        }

        function updateRepeatUI() {
            document.querySelectorAll('.option-pill').forEach(p => {
                const val = p.dataset.repeat;
                if (val === selectedRepeat) {
                    p.classList.add('selected');
                    p.innerHTML = val === 'none' ? '<i class="fas fa-check-circle"></i> None' : 
                                  (val === 'daily' ? '<i class="fas fa-check-circle"></i> Daily' : '<i class="fas fa-check-circle"></i> Weekly');
                } else {
                    p.classList.remove('selected');
                    p.innerHTML = val === 'none' ? '<i class="far fa-circle"></i> None' : 
                                  (val === 'daily' ? '<i class="fas fa-sun"></i> Daily' : '<i class="fas fa-calendar-week"></i> Weekly');
                }
            });
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function addTaskFromModal() {
            const inp = document.getElementById('modalTaskInput');
            const text = inp.value.trim();
            if (!text) { alert('enter task'); return; }
            const reminderTime = document.getElementById('reminderTime').value;
            const reminder = reminderTime ? reminderTime : null;
            activeTasks.push({
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 8),
                text: text,
                date: selectedDate,
                repeat: selectedRepeat,
                reminder: reminder,
            });
            save();
            inp.value = '';
            closeModal();
            renderCalendar();
            renderActiveList();
        }

        let touchStartX = 0;
        const swipeThreshold = 50;

        function handleSwipeStart(e) {
            touchStartX = e.touches[0].clientX;
        }
        function handleSwipeEnd(e) {
            if (!touchStartX) return;
            const diff = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(diff) > swipeThreshold) {
                if (diff > 0) {
                    if (currentMonth === 0) { currentMonth = 11; currentYear--; }
                    else currentMonth--;
                } else {
                    if (currentMonth === 11) { currentMonth = 0; currentYear++; }
                    else currentMonth++;
                }
                renderCalendar();
                renderActiveList();
            }
            touchStartX = 0;
        }

        function jumpToToday() {
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            selectedDate = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            renderCalendar();
            renderActiveList();
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderCalendar();
            renderActiveList();
            renderArchive();
            startReminderService();

            const swipeArea = document.getElementById('calendarSwipeArea');
            swipeArea.addEventListener('touchstart', handleSwipeStart, { passive: true });
            swipeArea.addEventListener('touchend', handleSwipeEnd);

            document.getElementById('todayTap').addEventListener('click', jumpToToday);
            document.getElementById('plusBtn').addEventListener('click', openModal);
            document.getElementById('modalAdd').addEventListener('click', addTaskFromModal);
            document.getElementById('modalCancel').addEventListener('click', closeModal);
            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === document.getElementById('modalOverlay')) closeModal();
            });
            document.getElementById('modalTaskInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') addTaskFromModal();
            });

            document.getElementById('repeatNone').addEventListener('click', () => {
                selectedRepeat = 'none';
                updateRepeatUI();
            });
            document.getElementById('repeatDaily').addEventListener('click', () => {
                selectedRepeat = 'daily';
                updateRepeatUI();
            });
            document.getElementById('repeatWeekly').addEventListener('click', () => {
                selectedRepeat = 'weekly';
                updateRepeatUI();
            });

            document.getElementById('reminderToggle').addEventListener('click', () => {
                document.getElementById('reminderTime').focus();
            });

            document.getElementById('archiveToggle').addEventListener('click', () => {
                archiveVisible = !archiveVisible;
                document.getElementById('archiveListContainer').classList.toggle('visible', archiveVisible);
                document.getElementById('archiveIcon').classList.toggle('rotate', archiveVisible);
            });
        });
    })();
</script>
</body>
</html>
