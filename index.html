<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>to·do · today & monthly</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            padding: 0;
            margin: 0;
        }

        .app {
            max-width: 480px;
            width: 100%;
            height: 100vh;
            max-height: -webkit-fill-available;
            background: white;
            box-shadow: 0 0 30px rgba(0, 15, 30, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0;
            margin: 0;
            padding: 0 1rem 0.5rem 1rem;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0.5rem 0 0.2rem 0;
            padding: 0;
            flex-shrink: 0;
        }

        .title-area h1 {
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(145deg, #1f3449, #2b4f74);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .plus-btn {
            width: 56px;
            height: 56px;
            background: #1f3449;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.4rem;
            font-weight: 300;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(25, 55, 80, 0.3);
            border: none;
            transition: 0.1s;
            flex-shrink: 0;
        }

        .plus-btn:active {
            background: #2b4f74;
            transform: scale(0.94);
        }

        /* professional stats row */
        .stats-row {
            display: flex;
            gap: 8px;
            margin: 0.6rem 0 1rem 0;
            flex-shrink: 0;
        }

        .stat-card {
            flex: 1;
            background: #ffffff;
            border-radius: 24px;
            padding: 0.7rem 0.1rem;
            text-align: center;
            font-weight: 500;
            font-size: 0.85rem;
            color: #25435f;
            border: 1px solid #e2eaf3;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 20, 40, 0.02);
        }

        .stat-card span:first-child {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1a3750;
            line-height: 1.2;
        }

        /* main content area (scrollable) */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0.2rem 0 0.5rem 0;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        /* TODAY section (active tasks for selected date) */
        .section-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin: 0 0 0.6rem 0.2rem;
            color: #1e3b5a;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .today-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 0.3rem;
        }
        .today-header .date-label {
            font-size: 1rem;
            font-weight: 500;
            color: #38658f;
            background: #eaf1fa;
            padding: 0.2rem 1rem;
            border-radius: 30px;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }

        .task-item {
            background: white;
            border: 1px solid #dee9f2;
            border-radius: 60px;
            padding: 0.3rem 0.3rem 0.3rem 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
        }

        .task-check {
            width: 38px;
            height: 38px;
            border-radius: 30px;
            border: 2.5px solid #b6cde5;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .task-check.completed { background: #1f8b4c; border-color: #0f682f; color: white; }

        .task-content {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            color: #1a3146;
            word-break: break-word;
            padding: 0.4rem 0;
        }

        .date-badge, .category-badge {
            font-size: 0.7rem;
            background: #eaf1fa;
            padding: 0.25rem 0.8rem;
            border-radius: 30px;
            margin-left: 0.4rem;
            font-weight: 400;
            color: #2b4f74;
            white-space: nowrap;
        }
        .category-badge { background: #f0e7d6; color: #8a5e2b; }

        .task-delete {
            background: transparent;
            border: none;
            color: #9bb3cf;
            font-size: 1.4rem;
            padding: 0.6rem 1rem 0.6rem 0.2rem;
            cursor: pointer;
        }

        .empty-message {
            text-align: center;
            color: #8ba3c2;
            padding: 1.8rem 1rem;
            background: #f6faff;
            border-radius: 50px;
            font-size: 0.95rem;
        }

        /* Completed archive (collapsible) */
        .archive-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #eef4fa;
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            margin: 0.5rem 0 0.5rem;
            border: 1px solid #c5d8f0;
            cursor: pointer;
            font-weight: 600;
            color: #1f3f60;
        }
        .archive-list {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
            max-height: 180px;
            overflow-y: auto;
        }
        .archive-list.visible { display: flex; }
        .archive-item {
            background: #f4faff;
            border: 1px dashed #adc5e2;
            border-radius: 40px;
            padding: 0.7rem 1.2rem;
            opacity: 0.85;
        }
        .archive-item .task-content { text-decoration: line-through; color: #4f6f91; }

        /* MONTHLY calendar view (full month, no toggle) */
        .monthly-calendar {
            background: white;
            border-radius: 32px;
            padding: 1rem 0.5rem 0.8rem;
            border: 1px solid #dae6f2;
            margin: 0.5rem 0 0.5rem;
        }
        .month-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding: 0 0.2rem;
        }
        .month-name {
            font-weight: 700;
            font-size: 1.5rem;
            color: #1d3f62;
        }
        .month-nav button {
            background: white;
            border: 1px solid #c9d9ee;
            width: 44px;
            height: 44px;
            border-radius: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            color: #1e3f60;
        }
        .month-nav button:active { background: #dae6f2; }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-weight: 600;
            color: #38658f;
            margin-bottom: 0.3rem;
            font-size: 0.8rem;
        }
        .month-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .cal-cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f9fcff;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #1e3c5c;
            border: 1px solid transparent;
            cursor: pointer;
            padding: 4px 0;
        }
        .cal-cell:active { background: #d9e6f5; transform: scale(0.96); }
        .cal-cell.has-tasks { background: #e1effb; border-color: #9bbde0; }
        .cal-cell.today { background: #2b4f74; color: white; font-weight: 700; }
        .cal-cell.selected { background: #ffe1b3; border: 2px solid #e67e22; color: #1d2b3a; font-weight: 700; }
        .task-dots { font-size: 0.6rem; letter-spacing: 1.5px; color: #2b4f74; margin-top: 2px; }
        .today .task-dots { color: #ffddb0; }

        /* bottom tab navigation */
        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: #f8fbfe;
            border-top: 1px solid #d5e3f0;
            border-radius: 40px;
            padding: 0.4rem 0.8rem;
            margin-top: 0.4rem;
            flex-shrink: 0;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0.5rem 0;
            border-radius: 40px;
            color: #4f6f91;
            font-weight: 500;
            font-size: 0.9rem;
            gap: 4px;
            cursor: pointer;
            transition: 0.1s;
            border: none;
            background: transparent;
        }
        .nav-item i { font-size: 1.4rem; }
        .nav-item.active {
            background: #1f3449;
            color: white;
            box-shadow: 0 6px 12px rgba(25,55,80,0.2);
        }
        .nav-item:active { transform: scale(0.96); }

        /* modal (unchanged) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1rem;
        }
        .modal-card {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 48px;
            padding: 2rem 1.5rem;
        }
        .modal-date { font-weight: 700; font-size: 1.7rem; color: #1d3f62; background: #e9f2fc; padding: 0.8rem 1rem; border-radius: 60px; text-align: center; margin-bottom: 1.2rem; }
        .modal-input { padding: 1.2rem 1.5rem; border: 2px solid #c9d9ee; border-radius: 60px; font-size: 1rem; width: 100%; margin-bottom: 1rem; }
        .time-picker-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.5rem; background: #f2f8ff; padding: 0.8rem 1.2rem; border-radius: 60px; }
        .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
        .modal-btn { background: #1f3449; color: white; border: none; padding: 1rem 2rem; border-radius: 60px; font-weight: 600; font-size: 1rem; cursor: pointer; flex: 1; }
        .modal-btn.cancel { background: #e2eaf3; color: #1d3f62; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app">
    <!-- fixed header -->
    <div class="header">
        <div class="title-area"><h1>TO-DO</h1></div>
        <div class="plus-btn" id="plusBtn">+</div>
    </div>

    <!-- stats row -->
    <div class="stats-row">
        <div class="stat-card"><span id="activeCount">0</span> active</div>
        <div class="stat-card"><span id="completedCount">0</span> done</div>
        <div class="stat-card"><span id="monthCount">0</span> this month</div>
    </div>

    <!-- main content (dynamic based on tab) -->
    <div class="main-content" id="mainContent">
        <!-- TODAY pane (default) -->
        <div id="todayPane">
            <div class="today-header">
                <div class="section-title"><i class="fas fa-sun"></i> TODAY</div>
                <span class="date-label" id="todayDateLabel"></span>
            </div>
            <div id="todayTaskList" class="task-list"></div>

            <div class="archive-header" id="archiveToggle">
                <i class="fas fa-archive" id="archiveIcon"></i> COMPLETED <span id="archiveCount">(0)</span>
            </div>
            <div id="archiveListContainer" class="archive-list"></div>
        </div>

        <!-- MONTH pane (hidden by default) -->
        <div id="monthPane" style="display: none;">
            <div class="monthly-calendar">
                <div class="month-header">
                    <span class="month-name" id="monthNameDisplay"></span>
                    <div class="month-nav">
                        <button id="prevMonthBtn">←</button>
                        <button id="nextMonthBtn">→</button>
                    </div>
                </div>
                <div class="weekdays">
                    <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                </div>
                <div id="monthGrid" class="month-grid"></div>
            </div>
            <!-- optional month hint -->
            <div style="padding: 0.5rem 0 0 0.8rem; color:#38658f; font-size:0.85rem;">⬇️ tap date to view tasks</div>
        </div>
    </div>

    <!-- bottom navigation -->
    <div class="bottom-nav">
        <button class="nav-item active" id="tabToday"><i class="fas fa-list-ul"></i><span>Today</span></button>
        <button class="nav-item" id="tabMonthly"><i class="fas fa-calendar-alt"></i><span>Monthly</span></button>
    </div>

    <!-- modal (same) -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <div class="modal-date" id="modalDate"></div>
            <input type="text" class="modal-input" id="modalTaskInput" placeholder="e.g., buy milk" autofocus>
            <div class="time-picker-row">
                <label>⏰</label>
                <input type="time" id="modalTimeInput" value="09:00">
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
                <button class="modal-btn" id="modalAdd">ADD</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- data ---
        let activeTasks = [], completedTasks = [];
        const STORAGE_KEY = 'todo_today_monthly';
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            try {
                const data = JSON.parse(stored);
                activeTasks = data.active || [];
                completedTasks = data.completed || [];
            } catch (e) { resetSample(); }
        } else { resetSample(); }

        function resetSample() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth()+1).padStart(2,'0');
            const d = String(today.getDate()).padStart(2,'0');
            activeTasks = [
                { id: 'a1', text: 'Having tea 🥤', date: `${y}-${m}-${d}`, time: '08:30', category: 'Inbox' },
                { id: 'a2', text: 'Paper check ✅', date: `${y}-${m}-${d}`, time: '10:00', category: 'Inbox' },
                { id: 'a3', text: 'Having fun', date: `${y}-${m}-${d}`, time: '15:00', category: 'Inbox' },
                { id: 'a4', text: 'Going to market', date: `${y}-${m}-${d}`, time: '17:30', category: 'Inbox' },
                { id: 'a5', text: 'cbse syllabus', date: `${y}-${m}-05`, time: '09:00', category: 'Study' },
                { id: 'a6', text: 'team meeting', date: `${y}-${m}-12`, time: '14:00', category: 'Work' },
            ];
            completedTasks = [
                { id: 'c1', text: 'Buy milk', date: `${y}-${m}-${d}`, time: '07:00', category: 'Inbox' },
                { id: 'c2', text: 'read 30 pages', date: `${y}-${m}-07`, time: '21:00', category: 'Personal' },
            ];
        }

        // state
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let selectedDate = (() => {
            const t = new Date();
            return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
        })();
        let archiveVisible = false;
        let currentTab = 'today'; // 'today' or 'monthly'

        // helpers
        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify({ active: activeTasks, completed: completedTasks })); }
        function formatDisplay(iso) { const [y,m,d]=iso.split('-'); const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`; }
        function activeCountForDate(dateStr) { return activeTasks.filter(t => t.date === dateStr).length; }

        // ---------- feedback (same) ----------
        function playFeedback(type = 'reminder') {
            if (navigator.vibrate) {
                if (type === 'reminder') navigator.vibrate([200, 100, 200]);
                else if (type === 'complete') navigator.vibrate(80);
            }
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const resumeAndPlay = () => {
                    if (type === 'reminder') {
                        const osc1 = audioCtx.createOscillator(); const gain1 = audioCtx.createGain();
                        osc1.connect(gain1); gain1.connect(audioCtx.destination);
                        osc1.frequency.value = 880; gain1.gain.value = 0.3;
                        osc1.start(); osc1.stop(audioCtx.currentTime + 0.15);
                        setTimeout(() => {
                            const osc2 = audioCtx.createOscillator(); const gain2 = audioCtx.createGain();
                            osc2.connect(gain2); gain2.connect(audioCtx.destination);
                            osc2.frequency.value = 880; gain2.gain.value = 0.3;
                            osc2.start(); osc2.stop(audioCtx.currentTime + 0.15);
                        }, 250);
                    } else if (type === 'complete') {
                        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                        osc.connect(gain); gain.connect(audioCtx.destination);
                        osc.frequency.value = 800; gain.gain.value = 0.25;
                        osc.start(); osc.stop(audioCtx.currentTime + 0.12);
                    }
                };
                if (audioCtx.state === 'suspended') audioCtx.resume().then(resumeAndPlay);
                else resumeAndPlay();
            } catch (e) {}
        }
        setInterval(() => {
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            if (activeTasks.some(t => t.date === todayStr && t.time === currentTime)) playFeedback('reminder');
        }, 30000);
        setTimeout(() => playFeedback('reminder'), 2000);

        // ---------- render today pane ----------
        function renderTodayPane() {
            // update date label
            document.getElementById('todayDateLabel').innerText = selectedDate;

            // tasks for selected date
            const container = document.getElementById('todayTaskList');
            const filtered = activeTasks.filter(t => t.date === selectedDate);
            if (filtered.length === 0) {
                container.innerHTML = `<div class="empty-message">✨ no tasks for this day</div>`;
            } else {
                let html = '';
                filtered.forEach(t => {
                    const timeDisplay = t.time ? ` ⏰ ${t.time}` : '';
                    const category = t.category || 'Inbox';
                    html += `
                        <div class="task-item" data-id="${t.id}">
                            <div class="task-check" data-id="${t.id}" data-action="toggle"></div>
                            <div class="task-content">${escapeHtml(t.text)}${timeDisplay}<span class="category-badge">${category}</span></div>
                            <button class="task-delete" data-id="${t.id}" data-action="delete"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            // archive
            const archiveContainer = document.getElementById('archiveListContainer');
            document.getElementById('archiveCount').innerText = `(${completedTasks.length})`;
            if (completedTasks.length === 0) {
                archiveContainer.innerHTML = `<div class="empty-message" style="padding:1rem;">no completed tasks</div>`;
            } else {
                let html = '';
                completedTasks.slice().reverse().forEach(t => {
                    const timeDisplay = t.time ? ` ⏰ ${t.time}` : '';
                    const category = t.category || 'Inbox';
                    html += `
                        <div class="archive-item">
                            <div class="task-content">${escapeHtml(t.text)}${timeDisplay}<span class="category-badge">${category}</span><span class="date-badge">${t.date}</span></div>
                        </div>
                    `;
                });
                archiveContainer.innerHTML = html;
            }

            attachActiveListeners();
            updateStats();
        }

        // ---------- render month pane (full month) ----------
        function renderMonthPane() {
            const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            document.getElementById('monthNameDisplay').innerText = `${monthNames[currentMonth]} ${currentYear}`;
            const grid = document.getElementById('monthGrid');
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();
            const isCurrentMonth = (today.getFullYear() === currentYear && today.getMonth() === currentMonth);

            let html = '';
            for (let i = 0; i < 42; i++) {
                const dayNum = i - firstDay + 1;
                if (dayNum > 0 && dayNum <= daysInMonth) {
                    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
                    const count = activeCountForDate(dateStr);
                    const isToday = isCurrentMonth && dayNum === today.getDate();
                    const isSelected = (dateStr === selectedDate);
                    let cls = 'cal-cell';
                    if (count > 0) cls += ' has-tasks';
                    if (isToday) cls += ' today';
                    if (isSelected) cls += ' selected';
                    const dots = '●'.repeat(Math.min(count, 5));
                    html += `<div class="${cls}" data-date="${dateStr}"><span>${dayNum}</span><span class="task-dots">${dots}</span></div>`;
                } else {
                    html += `<div class="cal-cell" style="background:transparent; pointer-events:none;"></div>`;
                }
            }
            grid.innerHTML = html;
            document.querySelectorAll('#monthGrid .cal-cell[data-date]').forEach(cell => {
                cell.addEventListener('click', (e) => {
                    const date = cell.dataset.date;
                    if (date) {
                        selectedDate = date;
                        // if we are in monthly tab, we also want to update the today pane for later, and optionally show feedback
                        if (currentTab === 'monthly') {
                            // just update, maybe later switch tab? but we keep selection
                            renderMonthPane();  // re-render to highlight selected
                            // also update today pane data silently
                        }
                    }
                });
            });
        }

        // escape
        function escapeHtml(str) { return str.replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); }

        // active listeners for toggle/delete
        function attachActiveListeners() {
            document.querySelectorAll('[data-action="toggle"]').forEach(el => {
                el.removeEventListener('click', handleToggle);
                el.addEventListener('click', handleToggle);
            });
            document.querySelectorAll('[data-action="delete"]').forEach(el => {
                el.removeEventListener('click', handleDelete);
                el.addEventListener('click', handleDelete);
            });
        }

        function handleToggle(e) {
            const id = e.currentTarget.dataset.id;
            const idx = activeTasks.findIndex(t => t.id === id);
            if (idx !== -1) {
                const [moved] = activeTasks.splice(idx, 1);
                completedTasks.push(moved);
                save(); playFeedback('complete');
                // re-render active pane and month if visible
                if (currentTab === 'today') renderTodayPane();
                renderMonthPane();  // update dots
                updateStats();
            }
        }

        function handleDelete(e) {
            const id = e.currentTarget.dataset.id;
            activeTasks = activeTasks.filter(t => t.id !== id);
            save();
            if (currentTab === 'today') renderTodayPane();
            renderMonthPane();
            updateStats();
        }

        function updateStats() {
            document.getElementById('activeCount').innerText = activeTasks.length;
            document.getElementById('completedCount').innerText = completedTasks.length;
            const monthStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`;
            const monthDone = completedTasks.filter(t => t.date.startsWith(monthStr)).length;
            document.getElementById('monthCount').innerText = monthDone;
        }

        // tab switching
        function switchTab(tab) {
            currentTab = tab;
            const todayPane = document.getElementById('todayPane');
            const monthPane = document.getElementById('monthPane');
            const tabToday = document.getElementById('tabToday');
            const tabMonthly = document.getElementById('tabMonthly');

            if (tab === 'today') {
                todayPane.style.display = 'block';
                monthPane.style.display = 'none';
                tabToday.classList.add('active');
                tabMonthly.classList.remove('active');
                renderTodayPane();  // refresh with latest selectedDate
            } else {
                todayPane.style.display = 'none';
                monthPane.style.display = 'block';
                tabToday.classList.remove('active');
                tabMonthly.classList.add('active');
                renderMonthPane();
            }
        }

        // modal
        function openModal() {
            document.getElementById('modalDate').innerText = `📅 ${selectedDate}`;
            document.getElementById('modalTaskInput').value = '';
            document.getElementById('modalTimeInput').value = '09:00';
            document.getElementById('modalOverlay').style.display = 'flex';
            setTimeout(() => document.getElementById('modalTaskInput').focus(), 100);
        }
        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        function addTaskFromModal() {
            const inp = document.getElementById('modalTaskInput');
            const text = inp.value.trim();
            if (!text) return;
            const time = document.getElementById('modalTimeInput').value;
            activeTasks.push({
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 6),
                text: text,
                date: selectedDate,
                time: time || null,
                category: 'Inbox'
            });
            save();
            inp.value = '';
            closeModal();
            if (currentTab === 'today') renderTodayPane();
            renderMonthPane();
            updateStats();
        }

        function clearArchive() {
            if (completedTasks.length && confirm('Permanently delete all completed tasks?')) {
                completedTasks = [];
                save();
                if (currentTab === 'today') renderTodayPane();
                updateStats();
            }
        }

        // month navigation
        function prevMonth() {
            if (currentMonth === 0) { currentMonth = 11; currentYear--; }
            else currentMonth--;
            renderMonthPane();
        }
        function nextMonth() {
            if (currentMonth === 11) { currentMonth = 0; currentYear++; }
            else currentMonth++;
            renderMonthPane();
        }

        // init
        window.addEventListener('DOMContentLoaded', () => {
            // set selectedDate to today
            const today = new Date();
            selectedDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();

            renderTodayPane();
            renderMonthPane();
            updateStats();

            // tabs
            document.getElementById('tabToday').addEventListener('click', () => switchTab('today'));
            document.getElementById('tabMonthly').addEventListener('click', () => switchTab('monthly'));

            // modal
            document.getElementById('plusBtn').addEventListener('click', openModal);
            document.getElementById('modalAdd').addEventListener('click', addTaskFromModal);
            document.getElementById('modalCancel').addEventListener('click', closeModal);
            document.getElementById('modalOverlay').addEventListener('click', (e) => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });
            document.getElementById('modalTaskInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addTaskFromModal(); });

            // archive toggle
            document.getElementById('archiveToggle').addEventListener('click', () => {
                archiveVisible = !archiveVisible;
                document.getElementById('archiveListContainer').classList.toggle('visible', archiveVisible);
                document.getElementById('archiveIcon').classList.toggle('rotate', archiveVisible);
            });

            document.getElementById('clearArchiveBtn')?.addEventListener('click', clearArchive); // hidden in today pane, but we keep
            // month nav
            document.getElementById('prevMonthBtn').addEventListener('click', prevMonth);
            document.getElementById('nextMonthBtn').addEventListener('click', nextMonth);
        });
    })();
</script>
</body>
</html>
