<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>to·do · mobile fixed</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', 'Poppins', system-ui, sans-serif;
        }

        :root {
            --primary: #2a5c8a;
            --primary-light: #4a7da8;
            --primary-soft: #e8f0f9;
            --secondary: #e67e22;
            --bg-main: #f5f9ff;
            --bg-card: #ffffff;
            --text-dark: #1e2f40;
            --text-medium: #3d556b;
            --text-light: #6b7f94;
            --border-soft: #e2eaf2;
            --success: #2a9d8f;
            --danger: #e76f51;
            --warning: #e9c46a;
            --shadow-sm: 0 4px 12px rgba(0, 20, 30, 0.04);
            --shadow-md: 0 8px 20px rgba(0, 25, 40, 0.08);
            --radius-card: 20px;
            --radius-item: 18px;
            --transition: all 0.2s ease;
        }

        body {
            background: var(--bg-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            padding: 0;
            margin: 0;
            position: fixed;
            width: 100%;
        }

        .app {
            max-width: 480px;
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            background: var(--bg-card);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0;
            margin: 0;
            position: relative;
        }

        /* floating add button */
        .fab {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 64px;
            height: 64px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.4rem;
            font-weight: 300;
            box-shadow: 0 8px 20px rgba(42, 92, 138, 0.4);
            border: none;
            cursor: pointer;
            z-index: 100;
            transition: transform 0.2s, background 0.2s;
            line-height: 1;
            padding-bottom: 4px;
            -webkit-tap-highlight-color: transparent;
        }
        .fab:active { transform: scale(0.92); background: var(--primary-light); }
        
        /* quick add bar */
        .quick-add {
            background: var(--bg-card);
            padding: 0.6rem 1rem;
            border-bottom: 1px solid var(--border-soft);
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .quick-add input {
            flex: 1;
            background: var(--bg-main);
            border: 1px solid var(--border-soft);
            border-radius: 40px;
            padding: 0.9rem 1.2rem;
            font-size: 0.95rem;
            color: var(--text-dark);
            -webkit-appearance: none;
            appearance: none;
        }
        .quick-add input:focus { outline: 2px solid var(--primary-soft); }
        .quick-add button {
            background: var(--primary);
            border: none;
            border-radius: 40px;
            color: white;
            padding: 0 1.6rem;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .quick-add button:active { background: var(--primary-light); }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0.5rem 1rem 0.2rem 1rem;
            flex-shrink: 0;
        }
        .title-area h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(145deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* dashboard stats - clickable */
        .stats-row {
            display: flex;
            gap: 8px;
            margin: 0.6rem 1rem 1rem 1rem;
            flex-shrink: 0;
        }
        .stat-card {
            flex: 1;
            background: var(--bg-main);
            border-radius: 24px;
            padding: 0.8rem 0.2rem;
            text-align: center;
            font-weight: 500;
            font-size: 0.8rem;
            color: var(--text-medium);
            border: 1px solid var(--border-soft);
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: var(--shadow-sm);
            cursor: pointer;
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .stat-card:active { background: var(--primary-soft); transform: scale(0.97); }
        .stat-card span:first-child {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1.2;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 1rem 0.5rem 1rem;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        /* today header */
        .today-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0.2rem 0 0.8rem 0;
        }
        .today-header .section-title {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .date-badge {
            background: var(--primary-soft);
            color: var(--primary);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* task list */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }
        .task-item {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-item);
            padding: 0.6rem 0.6rem 0.6rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            touch-action: pan-y;
            user-select: none;
            cursor: grab;
            -webkit-touch-callout: none;
        }
        .task-item:active { background: #f7faff; }
        @media (hover: hover) {
            .task-item:hover { box-shadow: var(--shadow-md); border-color: var(--primary-light); }
        }

        .task-check {
            width: 44px;
            height: 44px;
            border-radius: 40px;
            border: 2.5px solid var(--border-soft);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            flex-shrink: 0;
            color: var(--primary);
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .task-check:active { background: var(--primary-soft); }
        .task-check.completed {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .task-content {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-dark);
            word-break: break-word;
            line-height: 1.4;
        }
        .task-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            font-size: 0.75rem;
            color: var(--text-light);
            flex-wrap: wrap;
        }
        .badge {
            background: var(--primary-soft);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--primary);
            font-weight: 500;
        }
        .badge i { font-size: 0.7rem; }
        .priority-high { color: #e76f51; }
        .priority-medium { color: #e9c46a; }
        .priority-low { color: #2a9d8f; }

        .task-delete {
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 1.2rem;
            padding: 0.8rem;
            cursor: pointer;
            border-radius: 50%;
            -webkit-tap-highlight-color: transparent;
        }
        .task-delete:active { background: #fee2e2; color: var(--danger); }

        /* archive section */
        .archive-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: var(--bg-main);
            padding: 0.9rem 1.2rem;
            border-radius: 40px;
            margin: 0.8rem 0 0.5rem;
            border: 1px solid var(--border-soft);
            cursor: pointer;
            font-weight: 600;
            color: var(--text-dark);
            -webkit-tap-highlight-color: transparent;
        }
        .archive-header:active { background: var(--primary-soft); }
        .archive-list {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
            max-height: 180px;
            overflow-y: auto;
        }
        .archive-list.visible { display: flex; }
        
        .archive-item {
            background: var(--bg-main);
            border: 1px dashed var(--border-soft);
            border-radius: 40px;
            padding: 0.8rem 1.2rem;
            opacity: 0.85;
            position: relative;
            touch-action: pan-y;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .archive-item .task-content {
            text-decoration: line-through;
            color: var(--text-light);
            flex: 1;
        }
        .archive-delete-btn {
            background: transparent;
            border: none;
            color: var(--danger);
            font-size: 1.2rem;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            border-radius: 50%;
            opacity: 0.7;
            -webkit-tap-highlight-color: transparent;
        }
        .archive-delete-btn:active { opacity: 1; background: #fee2e2; }
        .archive-item.swipe-left { background: #fee9e7; border-color: var(--danger); }

        /* month calendar - with swipe support */
        .monthly-calendar {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 1.2rem 0.8rem 1rem;
            border: 1px solid var(--border-soft);
            margin: 0.2rem 0 1rem;
            box-shadow: var(--shadow-sm);
            touch-action: pan-x pinch-zoom;
        }
        .month-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            padding: 0 0.2rem;
        }
        .month-name {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--text-dark);
        }
        .month-nav { display: flex; gap: 6px; }
        .month-nav button {
            background: white;
            border: 1px solid var(--border-soft);
            width: 44px;
            height: 44px;
            border-radius: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--primary);
            -webkit-tap-highlight-color: transparent;
        }
        .month-nav button:active { background: var(--primary-soft); }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7,1fr);
            text-align: center;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }
        .month-grid {
            display: grid;
            grid-template-columns: repeat(7,1fr);
            gap: 5px;
        }
        .cal-cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-main);
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dark);
            border: 1px solid transparent;
            cursor: pointer;
            padding: 4px 0;
            transition: 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .cal-cell:active { background: var(--primary-soft); transform: scale(0.96); }
        .cal-cell.has-tasks { background: #e4edf7; border-color: var(--primary-light); }
        .cal-cell.today { background: var(--primary); color: white; font-weight: 700; }
        .cal-cell.selected { background: #fae1c2; border: 2px solid var(--secondary); }
        .task-dots { font-size: 0.6rem; letter-spacing: 1px; color: var(--primary); margin-top: 2px; }
        .today .task-dots { color: #ffddb0; }

        /* month tasks */
        .month-tasks-section {
            margin-top: 0.5rem;
            padding: 0 0.2rem;
        }
        .month-tasks-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .month-tasks-title i { color: var(--secondary); }

        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: var(--bg-card);
            border-top: 1px solid var(--border-soft);
            padding: 0.6rem 1rem 0.8rem;
            flex-shrink: 0;
            gap: 8px;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.85rem;
            padding: 0.5rem 0;
            border-radius: 40px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-item i { font-size: 1.3rem; }
        .nav-item.active {
            background: var(--primary-soft);
            color: var(--primary);
            font-weight: 600;
        }
        .nav-item:active { background: var(--primary-soft); }

        /* popup modal for active/done tasks */
        .popup-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1rem;
        }
        .popup-card {
            background: white;
            width: 100%;
            max-width: 400px;
            max-height: 80vh;
            border-radius: 40px;
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
        }
        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }
        .popup-header h3 {
            font-size: 1.5rem;
            color: var(--primary);
        }
        .popup-close {
            background: transparent;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text-light);
            padding: 0 0.5rem;
            -webkit-tap-highlight-color: transparent;
        }
        .popup-close:active { color: var(--danger); }
        .popup-task-list {
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            max-height: 60vh;
            padding-right: 0.3rem;
        }
        .popup-task-item {
            background: var(--bg-main);
            border-radius: 30px;
            padding: 0.8rem 1.2rem;
            border: 1px solid var(--border-soft);
        }
        .popup-task-item .task-content {
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .popup-meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            font-size: 0.75rem;
            color: var(--text-medium);
        }
        .empty-popup {
            text-align: center;
            color: var(--text-light);
            padding: 2rem;
        }

        /* main modal */
        .modal-overlay {
            display: none;
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1rem;
        }
        .modal-card {
            background: white; border-radius: 48px; padding: 2rem 1.5rem; max-width:400px;
        }
        .modal-date { font-weight: 700; font-size: 1.7rem; color: var(--primary); background: var(--primary-soft); padding: 0.8rem 1rem; border-radius: 60px; text-align: center; margin-bottom: 1.2rem; }
        .modal-input { padding: 1.2rem 1.5rem; border: 2px solid var(--border-soft); border-radius: 60px; font-size: 1rem; width: 100%; margin-bottom: 1rem; -webkit-appearance: none; }
        .time-picker-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.5rem; background: var(--bg-main); padding: 0.8rem 1.2rem; border-radius: 60px; }
        .modal-actions { display: flex; gap: 0.8rem; justify-content: flex-end; }
        .modal-btn { background: var(--primary); color: white; border: none; padding: 1rem 2rem; border-radius: 60px; font-weight: 600; font-size: 1rem; cursor: pointer; flex: 1; -webkit-tap-highlight-color: transparent; }
        .modal-btn.cancel { background: var(--bg-main); color: var(--text-dark); }
        .modal-btn:active { transform: scale(0.97); opacity: 0.8; }
        .empty-message { text-align: center; color: var(--text-light); padding: 2rem; background: var(--bg-main); border-radius: 40px; }

        /* notification permission banner */
        .notif-banner {
            background: var(--primary-soft);
            padding: 0.5rem 1rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--primary);
            border-bottom: 1px solid var(--border-soft);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .notif-banner:active { background: var(--primary-light); color: white; }
    </style>
</head>
<body>
<div class="app">
    <!-- FAB -->
    <button class="fab" id="fabBtn"><i class="fas fa-plus"></i></button>

    <div class="header">
        <div class="title-area"><h1>to·do</h1></div>
    </div>

    <!-- Notification permission banner -->
    <div class="notif-banner" id="notifBanner">
        <i class="fas fa-bell"></i> Enable reminders for alarms
    </div>

    <!-- quick add -->
    <div class="quick-add">
        <input type="text" id="quickTaskInput" placeholder="✍️ Write a task..." enterkeyhint="done">
        <button id="quickAddBtn"><i class="fas fa-plus"></i> Add</button>
    </div>

    <!-- clickable stats -->
    <div class="stats-row">
        <div class="stat-card" id="activeStatBtn"><span id="activeCount">0</span> active</div>
        <div class="stat-card" id="completedStatBtn"><span id="completedCount">0</span> done</div>
        <div class="stat-card"><span id="productivityStat">0%</span> productivity</div>
    </div>

    <div class="main-content" id="mainContent">
        <!-- TODAY pane -->
        <div id="todayPane">
            <div class="today-header">
                <div class="section-title"><i class="fas fa-sun" style="color: var(--secondary);"></i> Today</div>
                <span class="date-badge" id="todayDateLabel"></span>
            </div>
            <div id="todayTaskList" class="task-list"></div>

            <div class="archive-header" id="archiveToggle">
                <i class="fas fa-archive"></i> Completed <span id="archiveCount">(0)</span>
                <i class="fas fa-chevron-right" id="archiveIcon" style="margin-left: auto; transition: transform 0.2s;"></i>
            </div>
            <div id="archiveListContainer" class="archive-list"></div>
        </div>

        <!-- MONTH pane with swipe support -->
        <div id="monthPane" style="display: none;">
            <div class="monthly-calendar" id="monthlyCalendarSwipe">
                <div class="month-header">
                    <span class="month-name" id="monthNameDisplay"></span>
                    <div class="month-nav">
                        <button id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
                        <button id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="weekdays">
                    <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                </div>
                <div id="monthGrid" class="month-grid"></div>
            </div>
            <div class="month-tasks-section">
                <div class="month-tasks-title">
                    <i class="fas fa-tasks"></i> Tasks for <span id="monthSelectedDate"></span>
                </div>
                <div id="monthTaskList" class="task-list"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" id="tabToday"><i class="fas fa-list-ul"></i><span>Today</span></button>
        <button class="nav-item" id="tabMonthly"><i class="fas fa-calendar-alt"></i><span>Monthly</span></button>
    </div>

    <!-- POPUP for active tasks -->
    <div class="popup-modal" id="activePopup">
        <div class="popup-card">
            <div class="popup-header">
                <h3><i class="fas fa-tasks" style="color: var(--primary);"></i> All Active Tasks</h3>
                <button class="popup-close" id="closeActivePopup">&times;</button>
            </div>
            <div class="popup-task-list" id="activePopupList"></div>
        </div>
    </div>

    <!-- POPUP for completed tasks -->
    <div class="popup-modal" id="completedPopup">
        <div class="popup-card">
            <div class="popup-header">
                <h3><i class="fas fa-check-circle" style="color: var(--success);"></i> Completed Tasks</h3>
                <button class="popup-close" id="closeCompletedPopup">&times;</button>
            </div>
            <div class="popup-task-list" id="completedPopupList"></div>
        </div>
    </div>

    <!-- modal (original) -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <div class="modal-date" id="modalDate"></div>
            <input type="text" class="modal-input" id="modalTaskInput" placeholder="e.g., buy milk" enterkeyhint="done">
            <div class="time-picker-row"><label>⏰</label><input type="time" id="modalTimeInput" value="09:00"></div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
                <button class="modal-btn" id="modalAdd">ADD</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- data ---
        let activeTasks = [], completedTasks = [];
        const STORAGE_KEY = 'todo_mobile_fixed';
        
        // Load data
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const data = JSON.parse(stored);
                activeTasks = data.active || [];
                completedTasks = data.completed || [];
            } else {
                resetSample();
            }
        } catch (e) {
            resetSample();
        }

        function resetSample() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth()+1).padStart(2,'0');
            const d = String(today.getDate()).padStart(2,'0');
            activeTasks = [
                { id: 'a1', text: 'Having tea 🥤', date: `${y}-${m}-${d}`, time: '08:30', category: 'Health', priority: 'low' },
                { id: 'a2', text: 'Paper check ✅', date: `${y}-${m}-${d}`, time: '10:00', category: 'Work', priority: 'high' },
                { id: 'a3', text: 'Having fun', date: `${y}-${m}-${d}`, time: '15:00', category: 'Personal', priority: 'medium' },
                { id: 'a4', text: 'Going to market', date: `${y}-${m}-${d}`, time: '17:30', category: 'Shopping', priority: 'medium' },
                { id: 'a5', text: 'cbse syllabus', date: `${y}-${m}-05`, time: '09:00', category: 'Study', priority: 'high' },
                { id: 'a6', text: 'Team meeting', date: `${y}-${m}-12`, time: '14:00', category: 'Work', priority: 'high' },
                { id: 'a7', text: 'Dentist appointment', date: `${y}-${m}-18`, time: '11:30', category: 'Health', priority: 'medium' },
            ];
            completedTasks = [
                { id: 'c1', text: 'Buy milk', date: `${y}-${m}-${d}`, time: '07:00', category: 'Shopping', priority: 'low' },
                { id: 'c2', text: 'read 30 pages', date: `${y}-${m}-07`, time: '21:00', category: 'Study', priority: 'medium' },
                { id: 'c3', text: 'Old completed task', date: `${y}-${m}-01`, time: '12:00', category: 'Work', priority: 'high' },
            ];
        }

        // state
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let selectedDate = (() => {
            const t = new Date();
            return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
        })();
        let archiveVisible = false;
        let currentTab = 'today';

        // Notification permission
        const notifBanner = document.getElementById('notifBanner');
        if (Notification.permission === 'granted') {
            notifBanner.style.display = 'none';
        }
        notifBanner.addEventListener('click', () => {
            Notification.requestPermission().then(perm => {
                if (perm === 'granted') notifBanner.style.display = 'none';
            });
        });

        // --- BEEP + VIBRATION (complete & reminder) ---
        function playCompleteSound() {
            try {
                if (navigator.vibrate) navigator.vibrate(50);
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const resumeAndPlay = () => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 880;
                    gain.gain.value = 0.2;
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.1);
                };
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(resumeAndPlay);
                } else {
                    resumeAndPlay();
                }
            } catch (e) {}
        }

        function playReminderSound() {
            try {
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const resumeAndPlay = () => {
                    const osc1 = audioCtx.createOscillator();
                    const gain1 = audioCtx.createGain();
                    osc1.connect(gain1); gain1.connect(audioCtx.destination);
                    osc1.frequency.value = 660;
                    gain1.gain.value = 0.2;
                    osc1.start();
                    osc1.stop(audioCtx.currentTime + 0.15);
                    setTimeout(() => {
                        const osc2 = audioCtx.createOscillator();
                        const gain2 = audioCtx.createGain();
                        osc2.connect(gain2); gain2.connect(audioCtx.destination);
                        osc2.frequency.value = 660;
                        gain2.gain.value = 0.2;
                        osc2.start();
                        osc2.stop(audioCtx.currentTime + 0.15);
                    }, 200);
                };
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume().then(resumeAndPlay);
                } else {
                    resumeAndPlay();
                }
            } catch (e) {}
        }

        // --- ALARM SYSTEM ---
        function checkReminders() {
            const now = new Date();
            const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
            const currentTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
            
            activeTasks.forEach(task => {
                if (task.date === todayStr && task.time === currentTime) {
                    playReminderSound();
                    if (Notification.permission === 'granted') {
                        new Notification('⏰ Task Reminder', {
                            body: task.text,
                            icon: 'https://cdn-icons-png.flaticon.com/512/1632/1632597.png'
                        });
                    }
                }
            });
        }

        // Check every 30 seconds
        setInterval(checkReminders, 30000);
        setTimeout(checkReminders, 2000);

        // helpers
        function save() { 
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ active: activeTasks, completed: completedTasks })); 
            } catch (e) {}
        }
        function activeCountForDate(dateStr) { return activeTasks.filter(t => t.date === dateStr).length; }

        // update stats
        function updateStats() {
            document.getElementById('activeCount').innerText = activeTasks.length;
            document.getElementById('completedCount').innerText = completedTasks.length;
            const total = activeTasks.length + completedTasks.length;
            const percent = total ? Math.round((completedTasks.length / total)*100) : 0;
            document.getElementById('productivityStat').innerText = percent + '%';
        }

        function escapeHtml(str) { 
            return String(str).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); 
        }

        function priorityIcon(pri) {
            if (pri==='high') return '<i class="fas fa-flag priority-high"></i>';
            if (pri==='medium') return '<i class="fas fa-flag priority-medium"></i>';
            return '<i class="fas fa-flag priority-low"></i>';
        }

        // ----- TODAY pane -----
        function renderTodayPane() {
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            document.getElementById('todayDateLabel').innerText = todayStr;

            const container = document.getElementById('todayTaskList');
            const filtered = activeTasks.filter(t => t.date === todayStr);
            if (!filtered.length) {
                container.innerHTML = '<div class="empty-message">✨ no tasks for today</div>';
            } else {
                let html = '';
                filtered.forEach(t => {
                    const timeDisplay = t.time ? ` ⏰ ${t.time}` : '';
                    html += `
                        <div class="task-item" data-id="${t.id}">
                            <div class="task-check" data-id="${t.id}" data-action="toggle"><i class="fas fa-check"></i></div>
                            <div style="flex:1">
                                <div class="task-content">${escapeHtml(t.text)}${timeDisplay}</div>
                                <div class="task-meta">
                                    <span class="badge"><i class="fas fa-tag"></i> ${t.category || 'Inbox'}</span>
                                    <span class="badge">${priorityIcon(t.priority)} ${t.priority}</span>
                                </div>
                            </div>
                            <button class="task-delete" data-id="${t.id}" data-action="delete"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }
            renderArchiveList();
            attachActiveListeners();
            updateStats();
        }

        // ----- MONTH pane -----
        function renderMonthPane() {
            const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            document.getElementById('monthNameDisplay').innerText = `${monthNames[currentMonth]} ${currentYear}`;
            
            const grid = document.getElementById('monthGrid');
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();
            const isCurrentMonth = (today.getFullYear() === currentYear && today.getMonth() === currentMonth);

            let html = '';
            for (let i = 0; i < 42; i++) {
                const dayNum = i - firstDay + 1;
                if (dayNum > 0 && dayNum <= daysInMonth) {
                    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
                    const count = activeCountForDate(dateStr);
                    const isToday = isCurrentMonth && dayNum === today.getDate();
                    const isSelected = (dateStr === selectedDate);
                    let cls = 'cal-cell';
                    if (count > 0) cls += ' has-tasks';
                    if (isToday) cls += ' today';
                    if (isSelected) cls += ' selected';
                    const dots = '●'.repeat(Math.min(count, 5));
                    html += `<div class="${cls}" data-date="${dateStr}"><span>${dayNum}</span><span class="task-dots">${dots}</span></div>`;
                } else {
                    html += '<div class="cal-cell" style="background:transparent; pointer-events:none;"></div>';
                }
            }
            grid.innerHTML = html;

            // Attach click handlers
            document.querySelectorAll('#monthGrid .cal-cell[data-date]').forEach(cell => {
                cell.addEventListener('click', (e) => {
                    e.preventDefault();
                    selectedDate = cell.dataset.date;
                    renderMonthPane();
                });
            });

            document.getElementById('monthSelectedDate').innerText = selectedDate;
            const monthTaskContainer = document.getElementById('monthTaskList');
            const filtered = activeTasks.filter(t => t.date === selectedDate);
            if (!filtered.length) {
                monthTaskContainer.innerHTML = '<div class="empty-message">✨ no tasks for this date</div>';
            } else {
                let html = '';
                filtered.forEach(t => {
                    const timeDisplay = t.time ? ` ⏰ ${t.time}` : '';
                    html += `
                        <div class="task-item" data-id="${t.id}">
                            <div class="task-check" data-id="${t.id}" data-action="toggle"><i class="fas fa-check"></i></div>
                            <div style="flex:1">
                                <div class="task-content">${escapeHtml(t.text)}${timeDisplay}</div>
                                <div class="task-meta">
                                    <span class="badge"><i class="fas fa-tag"></i> ${t.category || 'Inbox'}</span>
                                    <span class="badge">${priorityIcon(t.priority)} ${t.priority}</span>
                                </div>
                            </div>
                            <button class="task-delete" data-id="${t.id}" data-action="delete"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
                monthTaskContainer.innerHTML = html;
            }
            attachActiveListeners();
        }

        // Archive list
        function renderArchiveList() {
            const arcContainer = document.getElementById('archiveListContainer');
            document.getElementById('archiveCount').innerText = `(${completedTasks.length})`;
            if (!completedTasks.length) {
                arcContainer.innerHTML = '<div class="empty-message" style="padding:1rem;">no completed tasks</div>';
            } else {
                let html = '';
                completedTasks.slice().reverse().forEach(t => {
                    const timeDisplay = t.time ? ` ⏰ ${t.time}` : '';
                    html += `
                        <div class="archive-item" data-archive-id="${t.id}">
                            <div class="task-content">${escapeHtml(t.text)}${timeDisplay} <span class="badge">${t.category||'Inbox'}</span></div>
                            <button class="archive-delete-btn" data-archive-id="${t.id}" data-archive-delete="true"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
                arcContainer.innerHTML = html;
            }
            attachArchiveSwipeAndDelete();
        }

        // Archive swipe & delete
        function attachArchiveSwipeAndDelete() {
            document.querySelectorAll('[data-archive-delete="true"]').forEach(btn => {
                btn.removeEventListener('click', handleArchiveDelete);
                btn.addEventListener('click', handleArchiveDelete);
            });
            
            document.querySelectorAll('.archive-item').forEach(item => {
                let touchX = 0;
                const id = item.dataset.archiveId;
                
                item.addEventListener('touchstart', (e) => { 
                    touchX = e.touches[0].clientX; 
                }, {passive: true});
                
                item.addEventListener('touchmove', (e) => {
                    if (!touchX) return;
                    const diff = e.touches[0].clientX - touchX;
                    if (diff < -20) item.classList.add('swipe-left');
                    else item.classList.remove('swipe-left');
                }, {passive: true});
                
                item.addEventListener('touchend', (e) => {
                    if (!touchX) return;
                    const diff = e.changedTouches[0].clientX - touchX;
                    if (diff < -50) {
                        const idx = completedTasks.findIndex(t => t.id === id);
                        if (idx !== -1) {
                            completedTasks.splice(idx, 1);
                            save();
                            playCompleteSound();
                            if (currentTab === 'today') renderTodayPane();
                            else renderMonthPane();
                            updateStats();
                        }
                    }
                    item.classList.remove('swipe-left');
                    touchX = 0;
                });
            });
        }

        function handleArchiveDelete(e) {
            e.preventDefault();
            e.stopPropagation();
            const id = e.currentTarget.dataset.archiveId;
            const idx = completedTasks.findIndex(t => t.id === id);
            if (idx !== -1) {
                completedTasks.splice(idx, 1);
                save();
                playCompleteSound();
                if (currentTab === 'today') renderTodayPane();
                else renderMonthPane();
                updateStats();
            }
        }

        // Active task listeners
        function attachActiveListeners() {
            // Toggle buttons
            document.querySelectorAll('[data-action="toggle"]').forEach(el => {
                el.removeEventListener('click', handleToggle);
                el.addEventListener('click', handleToggle);
            });
            
            // Delete buttons
            document.querySelectorAll('[data-action="delete"]').forEach(el => {
                el.removeEventListener('click', handleDelete);
                el.addEventListener('click', handleDelete);
            });
            
            // Swipe on task items
            document.querySelectorAll('.task-item').forEach(item => {
                let touchX = 0;
                let touchStartTime = 0;
                
                item.addEventListener('touchstart', (e) => { 
                    touchX = e.touches[0].clientX;
                    touchStartTime = Date.now();
                }, {passive: true});
                
                item.addEventListener('touchend', (e) => {
                    if (!touchX) return;
                    const diff = e.changedTouches[0].clientX - touchX;
                    const touchDuration = Date.now() - touchStartTime;
                    
                    // Only trigger swipe if it's a quick swipe (not a long press)
                    if (Math.abs(diff) > 40 && touchDuration < 300) {
                        e.preventDefault();
                        const id = item.dataset.id;
                        if (diff > 0) { // right swipe
                            const task = activeTasks.find(t => t.id === id);
                            if (task) moveToCompleted(task);
                        } else { // left swipe
                            activeTasks = activeTasks.filter(t => t.id !== id);
                            save();
                            playCompleteSound();
                            if (currentTab === 'today') renderTodayPane();
                            else renderMonthPane();
                            updateStats();
                        }
                    }
                    touchX = 0;
                });
                
                // Long press for edit
                let longPressTimer;
                item.addEventListener('touchstart', (e) => {
                    longPressTimer = setTimeout(() => { 
                        alert('✏️ Edit task (demo)'); 
                    }, 600);
                }, {passive: true});
                
                item.addEventListener('touchend', () => clearTimeout(longPressTimer));
                item.addEventListener('touchmove', () => clearTimeout(longPressTimer));
                item.addEventListener('touchcancel', () => clearTimeout(longPressTimer));
            });
        }

        function moveToCompleted(task) {
            const idx = activeTasks.findIndex(t => t.id === task.id);
            if (idx !== -1) {
                const [moved] = activeTasks.splice(idx, 1);
                completedTasks.push(moved);
                save();
                playCompleteSound();
                if (currentTab === 'today') renderTodayPane();
                else renderMonthPane();
                updateStats();
            }
        }

        function handleToggle(e) {
            e.preventDefault();
            const id = e.currentTarget.dataset.id;
            const task = activeTasks.find(t => t.id === id);
            if (task) moveToCompleted(task);
        }

        function handleDelete(e) {
            e.preventDefault();
            const id = e.currentTarget.dataset.id;
            activeTasks = activeTasks.filter(t => t.id !== id);
            save();
            playCompleteSound();
            if (currentTab === 'today') renderTodayPane();
            else renderMonthPane();
            updateStats();
        }

        // Popup functions
        function showActivePopup() {
            const popupList = document.getElementById('activePopupList');
            if (activeTasks.length === 0) {
                popupList.innerHTML = '<div class="empty-popup">✨ no active tasks</div>';
            } else {
                let html = '';
                activeTasks.forEach(t => {
                    html += `
                        <div class="popup-task-item">
                            <div class="task-content">${escapeHtml(t.text)}</div>
                            <div class="popup-meta">
                                <span class="badge"><i class="fas fa-calendar"></i> ${t.date}</span>
                                <span class="badge"><i class="fas fa-tag"></i> ${t.category || 'Inbox'}</span>
                                <span class="badge">${priorityIcon(t.priority)} ${t.priority}</span>
                                ${t.time ? `<span class="badge"><i class="fas fa-clock"></i> ${t.time}</span>` : ''}
                            </div>
                        </div>
                    `;
                });
                popupList.innerHTML = html;
            }
            document.getElementById('activePopup').style.display = 'flex';
        }

        function showCompletedPopup() {
            const popupList = document.getElementById('completedPopupList');
            if (completedTasks.length === 0) {
                popupList.innerHTML = '<div class="empty-popup">✅ no completed tasks</div>';
            } else {
                let html = '';
                completedTasks.slice().reverse().forEach(t => {
                    html += `
                        <div class="popup-task-item">
                            <div class="task-content" style="text-decoration: line-through; color: var(--text-light);">${escapeHtml(t.text)}</div>
                            <div class="popup-meta">
                                <span class="badge"><i class="fas fa-calendar"></i> ${t.date}</span>
                                <span class="badge"><i class="fas fa-tag"></i> ${t.category || 'Inbox'}</span>
                                <span class="badge">${priorityIcon(t.priority)} ${t.priority}</span>
                                ${t.time ? `<span class="badge"><i class="fas fa-clock"></i> ${t.time}</span>` : ''}
                            </div>
                        </div>
                    `;
                });
                popupList.innerHTML = html;
            }
            document.getElementById('completedPopup').style.display = 'flex';
        }

        // Quick add
        document.getElementById('quickAddBtn').addEventListener('click', () => {
            const inp = document.getElementById('quickTaskInput');
            const text = inp.value.trim();
            if (!text) return;
            const targetDate = (currentTab === 'monthly') ? selectedDate : (() => {
                const t = new Date(); 
                return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
            })();
            activeTasks.push({ 
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 6), 
                text, 
                date: targetDate, 
                time: '12:00', 
                category: 'Inbox', 
                priority: 'medium' 
            });
            save(); 
            inp.value = '';
            if (currentTab === 'today') renderTodayPane();
            else renderMonthPane();
            updateStats();
        });

        // Quick add on enter
        document.getElementById('quickTaskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('quickAddBtn').click();
            }
        });

        // Tabs
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('todayPane').style.display = tab === 'today' ? 'block' : 'none';
            document.getElementById('monthPane').style.display = tab === 'monthly' ? 'block' : 'none';
            document.getElementById('tabToday').classList.toggle('active', tab === 'today');
            document.getElementById('tabMonthly').classList.toggle('active', tab === 'monthly');
            if (tab === 'today') renderTodayPane();
            else renderMonthPane();
        }

        document.getElementById('tabToday').addEventListener('click', () => switchTab('today'));
        document.getElementById('tabMonthly').addEventListener('click', () => switchTab('monthly'));

        // Modal (FAB)
        const modal = document.getElementById('modalOverlay');
        document.getElementById('fabBtn').addEventListener('click', () => {
            document.getElementById('modalDate').innerText = `📅 ${selectedDate}`;
            document.getElementById('modalTaskInput').value = '';
            document.getElementById('modalTimeInput').value = '09:00';
            modal.style.display = 'flex';
        });

        document.getElementById('modalCancel').addEventListener('click', () => {
            modal.style.display = 'none';
        });

        document.getElementById('modalAdd').addEventListener('click', () => {
            const inp = document.getElementById('modalTaskInput');
            const text = inp.value.trim();
            if (!text) return;
            const time = document.getElementById('modalTimeInput').value;
            activeTasks.push({ 
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 6), 
                text, 
                date: selectedDate, 
                time, 
                category: 'Inbox', 
                priority: 'medium' 
            });
            save(); 
            inp.value = ''; 
            modal.style.display = 'none';
            if (currentTab === 'today') renderTodayPane();
            else renderMonthPane();
            updateStats();
        });

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                modal.style.display = 'none';
            }
        });

        // Archive toggle
        document.getElementById('archiveToggle').addEventListener('click', () => {
            archiveVisible = !archiveVisible;
            document.getElementById('archiveListContainer').classList.toggle('visible', archiveVisible);
            document.getElementById('archiveIcon').style.transform = archiveVisible ? 'rotate(90deg)' : 'rotate(0)';
        });

        // Month navigation
        function prevMonth() {
            if (currentMonth === 0) { 
                currentMonth = 11; 
                currentYear--; 
            } else { 
                currentMonth--; 
            }
            const firstDayStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
            selectedDate = firstDayStr;
            renderMonthPane();
        }

        function nextMonth() {
            if (currentMonth === 11) { 
                currentMonth = 0; 
                currentYear++; 
            } else { 
                currentMonth++; 
            }
            const firstDayStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
            selectedDate = firstDayStr;
            renderMonthPane();
        }

        document.getElementById('prevMonthBtn').addEventListener('click', prevMonth);
        document.getElementById('nextMonthBtn').addEventListener('click', nextMonth);

        // Swipe for month calendar
        const calendarSwipe = document.getElementById('monthlyCalendarSwipe');
        let touchStartX = 0;
        
        calendarSwipe.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        }, {passive: true});
        
        calendarSwipe.addEventListener('touchend', (e) => {
            if (!touchStartX) return;
            const diff = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) {
                    prevMonth();
                } else {
                    nextMonth();
                }
            }
            touchStartX = 0;
        });

        // Popup triggers
        document.getElementById('activeStatBtn').addEventListener('click', showActivePopup);
        document.getElementById('completedStatBtn').addEventListener('click', showCompletedPopup);
        
        document.getElementById('closeActivePopup').addEventListener('click', () => {
            document.getElementById('activePopup').style.display = 'none';
        });
        
        document.getElementById('closeCompletedPopup').addEventListener('click', () => {
            document.getElementById('completedPopup').style.display = 'none';
        });
        
        // Close popups on overlay click
        document.getElementById('activePopup').addEventListener('click', (e) => {
            if (e.target === document.getElementById('activePopup')) {
                document.getElementById('activePopup').style.display = 'none';
            }
        });
        
        document.getElementById('completedPopup').addEventListener('click', (e) => {
            if (e.target === document.getElementById('completedPopup')) {
                document.getElementById('completedPopup').style.display = 'none';
            }
        });

        // Initialize
        (function init() {
            const today = new Date();
            selectedDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            renderTodayPane();
            renderMonthPane();
            updateStats();
            switchTab('today');
        })();
    })();
</script>
</body>
</html>
