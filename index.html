<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>TO-DO · priority · daily/weekly · today button</title>
    <!-- Google Fonts + Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', 'Poppins', system-ui, sans-serif;
        }

        :root {
            --primary: #2a5c8a;
            --primary-light: #4a7da8;
            --primary-soft: #e8f0f9;
            --secondary: #e67e22;
            --bg-main: #f5f9ff;
            --bg-card: #ffffff;
            --text-dark: #1e2f40;
            --text-medium: #3d556b;
            --text-light: #6b7f94;
            --border-soft: #e2eaf2;
            --success: #2a9d8f;
            --danger: #e76f51;
            --warning: #e9c46a;
            --priority-high: #e76f51;
            --priority-medium: #f4a261;
            --priority-low: #2a9d8f;
            --shadow-sm: 0 4px 12px rgba(0, 20, 30, 0.04);
            --shadow-md: 0 8px 20px rgba(0, 25, 40, 0.08);
            --radius-card: 20px;
            --radius-item: 18px;
            --transition: all 0.2s ease;
        }

        body {
            background: var(--bg-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            overflow: hidden;
            padding: 0;
            margin: 0;
            position: fixed;
            width: 100%;
        }

        .app {
            max-width: 480px;
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available;
            background: var(--bg-card);
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 0;
            margin: 0;
            position: relative;
        }

        /* header with + icon and today button */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0.5rem 1rem 0.2rem 1rem;
            flex-shrink: 0;
            gap: 8px;
        }
        .title-area h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(145deg, var(--primary), var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: auto;
        }

        /* today button */
        .today-btn {
            background: var(--primary-soft);
            border: 1px solid var(--border-soft);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            -webkit-tap-highlight-color: transparent;
            white-space: nowrap;
        }
        .today-btn i { font-size: 0.9rem; }
        .today-btn:active { background: var(--primary); color: white; }

        /* plus icon */
        .plus-icon {
            width: 44px;
            height: 44px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
            font-weight: 300;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(42, 92, 138, 0.3);
            border: none;
            transition: transform 0.2s, background 0.2s;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .plus-icon:active { transform: scale(0.92); background: var(--primary-light); }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 0 1rem 0.5rem 1rem;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            display: flex;
            flex-direction: column;
        }

        /* today header */
        .today-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0.2rem 0 0.8rem 0;
        }
        .today-header .section-title {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .date-badge {
            background: var(--primary-soft);
            color: var(--primary);
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* task list */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
        }

        /* priority order visual - tasks will be sorted in JS */
        .task-item {
            background: var(--bg-card);
            border: 1px solid var(--border-soft);
            border-radius: var(--radius-item);
            padding: 0.6rem 0.6rem 0.6rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            position: relative;
            touch-action: pan-y;
            user-select: none;
            -webkit-touch-callout: none;
            border-left-width: 6px;
            border-left-style: solid;
        }

        /* priority border colors */
        .task-item.priority-high { border-left-color: var(--priority-high); }
        .task-item.priority-medium { border-left-color: var(--priority-medium); }
        .task-item.priority-low { border-left-color: var(--priority-low); }

        .task-item:active { background: #f7faff; }

        .task-check {
            width: 44px;
            height: 44px;
            border-radius: 40px;
            border: 2.5px solid var(--border-soft);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            flex-shrink: 0;
            color: var(--primary);
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .task-check:active { background: var(--primary-soft); }
        .task-check.completed {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .task-content {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-dark);
            word-break: break-word;
            line-height: 1.4;
        }
        .task-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
            font-size: 0.75rem;
            color: var(--text-light);
            flex-wrap: wrap;
        }
        .badge {
            background: var(--primary-soft);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--primary);
            font-weight: 500;
        }
        .badge i { font-size: 0.7rem; }

        /* priority badge colors */
        .priority-badge-high {
            background: #fee2e2;
            color: var(--priority-high);
        }
        .priority-badge-medium {
            background: #fff3e0;
            color: #b85e00;
        }
        .priority-badge-low {
            background: #e0f2e9;
            color: var(--priority-low);
        }
        .repeat-badge {
            background: #e8f0fe;
            color: var(--primary);
        }

        .task-delete {
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 1.2rem;
            padding: 0.8rem;
            cursor: pointer;
            border-radius: 50%;
            -webkit-tap-highlight-color: transparent;
        }
        .task-delete:active { background: #fee2e2; color: var(--danger); }

        /* archive section */
        .archive-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            background: var(--bg-main);
            padding: 0.9rem 1.2rem;
            border-radius: 40px;
            margin: 0.8rem 0 0.5rem;
            border: 1px solid var(--border-soft);
            cursor: pointer;
            font-weight: 600;
            color: var(--text-dark);
            -webkit-tap-highlight-color: transparent;
        }
        .archive-header:active { background: var(--primary-soft); }
        .archive-list {
            display: none;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
            max-height: 180px;
            overflow-y: auto;
        }
        .archive-list.visible { display: flex; }
        
        .archive-item {
            background: var(--bg-main);
            border: 1px dashed var(--border-soft);
            border-radius: 40px;
            padding: 0.8rem 1.2rem;
            opacity: 0.85;
            position: relative;
            touch-action: pan-y;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .archive-item .task-content {
            text-decoration: line-through;
            color: var(--text-light);
            flex: 1;
        }
        .archive-delete-btn {
            background: transparent;
            border: none;
            color: var(--danger);
            font-size: 1.2rem;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            border-radius: 50%;
            opacity: 0.7;
            -webkit-tap-highlight-color: transparent;
        }
        .archive-delete-btn:active { opacity: 1; background: #fee2e2; }
        .archive-item.swipe-left { background: #fee9e7; border-color: var(--danger); }

        /* redesigned month calendar */
        .monthly-calendar {
            background: var(--bg-card);
            border-radius: 28px;
            padding: 1.2rem 0.8rem 1rem;
            border: 1px solid var(--border-soft);
            margin: 1rem 0 0.5rem;
            box-shadow: var(--shadow-sm);
        }
        .month-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.2rem;
            padding: 0 0.2rem;
        }
        .month-name {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--text-dark);
        }
        .month-nav { display: flex; gap: 6px; }
        .month-nav button {
            background: white;
            border: 1px solid var(--border-soft);
            width: 44px;
            height: 44px;
            border-radius: 40px;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--primary);
            -webkit-tap-highlight-color: transparent;
        }
        .month-nav button:active { background: var(--primary-soft); }
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7,1fr);
            text-align: center;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
        }
        .month-grid {
            display: grid;
            grid-template-columns: repeat(7,1fr);
            gap: 5px;
        }
        .cal-cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-main);
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dark);
            border: 1px solid transparent;
            cursor: pointer;
            padding: 4px 0;
            transition: 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .cal-cell:active { background: var(--primary-soft); transform: scale(0.96); }
        .cal-cell.has-tasks { background: #e4edf7; border-color: var(--primary-light); }
        .cal-cell.today { background: var(--primary); color: white; font-weight: 700; }
        .cal-cell.selected { background: #fae1c2; border: 2px solid var(--secondary); }
        .task-dots { font-size: 0.6rem; letter-spacing: 1px; color: var(--primary); margin-top: 2px; }
        .today .task-dots { color: #ffddb0; }

        /* month tasks - above calendar */
        .month-tasks-section {
            margin-top: 0.2rem;
            margin-bottom: 0.5rem;
            padding: 0 0.2rem;
        }
        .month-tasks-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .month-tasks-title i { color: var(--secondary); }

        .bottom-nav {
            display: flex;
            align-items: center;
            justify-content: space-around;
            background: var(--bg-card);
            border-top: 1px solid var(--border-soft);
            padding: 0.6rem 1rem 0.8rem;
            flex-shrink: 0;
            gap: 8px;
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.85rem;
            padding: 0.5rem 0;
            border-radius: 40px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .nav-item i { font-size: 1.3rem; }
        .nav-item.active {
            background: var(--primary-soft);
            color: var(--primary);
            font-weight: 600;
        }
        .nav-item:active { background: var(--primary-soft); }

        /* modal with repeat and priority options */
        .modal-overlay {
            display: none;
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1rem;
        }
        .modal-card {
            background: white; border-radius: 48px; padding: 2rem 1.5rem; max-width:400px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-date { 
            font-weight: 700; 
            font-size: 1.5rem; 
            color: var(--primary); 
            background: var(--primary-soft); 
            padding: 0.8rem 1rem; 
            border-radius: 60px; 
            text-align: center; 
            margin-bottom: 1.5rem; 
        }
        .modal-input { 
            padding: 1.2rem 1.5rem; 
            border: 2px solid var(--border-soft); 
            border-radius: 60px; 
            font-size: 1rem; 
            width: 100%; 
            margin-bottom: 1.5rem; 
            -webkit-appearance: none; 
        }

        /* option rows for repeat and priority */
        .options-row {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .option-pill {
            flex: 1 0 auto;
            background: var(--bg-main);
            border-radius: 40px;
            padding: 0.7rem 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dark);
            -webkit-tap-highlight-color: transparent;
            transition: all 0.1s;
        }
        .option-pill i { font-size: 0.9rem; }
        .option-pill.selected {
            background: #fff1dc;
            border-color: var(--secondary);
            color: var(--secondary);
        }

        .priority-row {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }
        .priority-pill {
            flex: 1;
            padding: 0.7rem 0.3rem;
            border-radius: 40px;
            border: 2px solid transparent;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            background: var(--bg-main);
            color: var(--text-dark);
            -webkit-tap-highlight-color: transparent;
        }
        .priority-pill.high.selected {
            background: #fee2e2;
            border-color: var(--priority-high);
            color: var(--priority-high);
        }
        .priority-pill.medium.selected {
            background: #fff3e0;
            border-color: var(--priority-medium);
            color: #b85e00;
        }
        .priority-pill.low.selected {
            background: #e0f2e9;
            border-color: var(--priority-low);
            color: var(--priority-low);
        }

        .modal-actions { 
            display: flex; 
            gap: 0.8rem; 
            justify-content: flex-end; 
            margin-top: 1rem;
        }
        .modal-btn { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 1rem 2rem; 
            border-radius: 60px; 
            font-weight: 600; 
            font-size: 1rem; 
            cursor: pointer; 
            flex: 1; 
            -webkit-tap-highlight-color: transparent; 
        }
        .modal-btn.cancel { 
            background: var(--bg-main); 
            color: var(--text-dark); 
        }
        .modal-btn:active { 
            transform: scale(0.97); 
            opacity: 0.8; 
        }
        .empty-message { 
            text-align: center; 
            color: var(--text-light); 
            padding: 2rem; 
            background: var(--bg-main); 
            border-radius: 40px; 
        }
    </style>
</head>
<body>
<div class="app">
    <!-- header with today button and + icon -->
    <div class="header">
        <div class="title-area"><h1>TO-DO</h1></div>
        <div class="today-btn" id="todayBtn"><i class="fas fa-calendar-day"></i> Today</div>
        <div class="plus-icon" id="plusIcon"><i class="fas fa-plus"></i></div>
    </div>

    <div class="main-content" id="mainContent">
        <!-- TODAY pane -->
        <div id="todayPane">
            <div class="today-header">
                <div class="section-title"><i class="fas fa-sun" style="color: var(--secondary);"></i> Today</div>
                <span class="date-badge" id="todayDateLabel"></span>
            </div>
            <div id="todayTaskList" class="task-list"></div>

            <div class="archive-header" id="archiveToggle">
                <i class="fas fa-archive"></i> Completed <span id="archiveCount">(0)</span>
                <i class="fas fa-chevron-right" id="archiveIcon" style="margin-left: auto; transition: transform 0.2s;"></i>
            </div>
            <div id="archiveListContainer" class="archive-list"></div>
        </div>

        <!-- MONTH pane with tasks above calendar -->
        <div id="monthPane" style="display: none;">
            <div class="month-tasks-section">
                <div class="month-tasks-title">
                    <i class="fas fa-tasks"></i> Tasks for <span id="monthSelectedDate"></span>
                </div>
                <div id="monthTaskList" class="task-list"></div>
            </div>
            
            <div class="monthly-calendar" id="monthlyCalendar">
                <div class="month-header">
                    <span class="month-name" id="monthNameDisplay"></span>
                    <div class="month-nav">
                        <button id="prevMonthBtn"><i class="fas fa-chevron-left"></i></button>
                        <button id="nextMonthBtn"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="weekdays">
                    <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                </div>
                <div id="monthGrid" class="month-grid"></div>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" id="tabToday"><i class="fas fa-list-ul"></i><span>Today</span></button>
        <button class="nav-item" id="tabMonthly"><i class="fas fa-calendar-alt"></i><span>Monthly</span></button>
    </div>

    <!-- modal with repeat and priority options -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <div class="modal-date" id="modalDate"></div>
            <input type="text" class="modal-input" id="modalTaskInput" placeholder="e.g., buy milk" enterkeyhint="done">

            <!-- Repeat options: None, Daily, Weekly -->
            <div class="options-row">
                <div class="option-pill" id="repeatNone" data-repeat="none"><i class="far fa-circle"></i> None</div>
                <div class="option-pill" id="repeatDaily" data-repeat="daily"><i class="fas fa-sun"></i> Daily</div>
                <div class="option-pill" id="repeatWeekly" data-repeat="weekly"><i class="fas fa-calendar-week"></i> Weekly</div>
            </div>

            <!-- Priority options -->
            <div class="priority-row">
                <div class="priority-pill high" id="priorityHigh" data-priority="high">🔴 High</div>
                <div class="priority-pill medium" id="priorityMedium" data-priority="medium">🟠 Medium</div>
                <div class="priority-pill low" id="priorityLow" data-priority="low">🟢 Low</div>
            </div>

            <div class="modal-actions">
                <button class="modal-btn cancel" id="modalCancel">Cancel</button>
                <button class="modal-btn" id="modalAdd">ADD</button>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        // --- data with repeat and priority fields ---
        let activeTasks = [], completedTasks = [];
        const STORAGE_KEY = 'todo_priority_v1';
        
        // Load data
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const data = JSON.parse(stored);
                activeTasks = data.active || [];
                completedTasks = data.completed || [];
            } else {
                resetSample();
            }
        } catch (e) {
            resetSample();
        }

        function resetSample() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth()+1).padStart(2,'0');
            const d = String(today.getDate()).padStart(2,'0');
            activeTasks = [
                { id: 'a1', text: 'Having tea 🥤', date: `${y}-${m}-${d}`, repeat: 'daily', priority: 'low' },
                { id: 'a2', text: 'Paper check ✅', date: `${y}-${m}-${d}`, repeat: 'none', priority: 'high' },
                { id: 'a3', text: 'Having fun', date: `${y}-${m}-${d}`, repeat: 'none', priority: 'medium' },
                { id: 'a4', text: 'Going to market', date: `${y}-${m}-${d}`, repeat: 'weekly', priority: 'medium' },
                { id: 'a5', text: 'cbse syllabus', date: `${y}-${m}-05`, repeat: 'none', priority: 'high' },
                { id: 'a6', text: 'Team meeting', date: `${y}-${m}-12`, repeat: 'weekly', priority: 'high' },
                { id: 'a7', text: 'Dentist appointment', date: `${y}-${m}-18`, repeat: 'none', priority: 'medium' },
            ];
            completedTasks = [
                { id: 'c1', text: 'Buy milk', date: `${y}-${m}-${d}`, repeat: 'none', priority: 'low' },
                { id: 'c2', text: 'read 30 pages', date: `${y}-${m}-07`, repeat: 'none', priority: 'medium' },
                { id: 'c3', text: 'Old task', date: `${y}-${m}-01`, repeat: 'none', priority: 'high' },
            ];
        }

        // state
        let currentYear = new Date().getFullYear();
        let currentMonth = new Date().getMonth();
        let selectedDate = (() => {
            const t = new Date();
            return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
        })();
        let archiveVisible = false;
        let currentTab = 'today';

        // Modal state
        let selectedRepeat = 'none';
        let selectedPriority = 'medium';

        // helpers
        function save() { 
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ active: activeTasks, completed: completedTasks })); 
            } catch (e) {}
        }
        function activeCountForDate(dateStr) { return activeTasks.filter(t => t.date === dateStr).length; }

        // update archive count
        function updateArchiveCount() {
            document.getElementById('archiveCount').innerText = `(${completedTasks.length})`;
        }

        function escapeHtml(str) { 
            return String(str).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[m]); 
        }

        // Priority order for sorting: high > medium > low
        function getPriorityWeight(priority) {
            if (priority === 'high') return 3;
            if (priority === 'medium') return 2;
            return 1; // low
        }

        // Sort tasks by priority (high first)
        function sortTasksByPriority(tasks) {
            return tasks.sort((a, b) => {
                return getPriorityWeight(b.priority) - getPriorityWeight(a.priority);
            });
        }

        // Get priority class for task item
        function getPriorityClass(priority) {
            return 'priority-' + priority;
        }

        // Get priority badge HTML
        function getPriorityBadge(priority) {
            const icons = {
                high: '🔴',
                medium: '🟠',
                low: '🟢'
            };
            const labels = {
                high: 'High',
                medium: 'Medium',
                low: 'Low'
            };
            return `<span class="badge priority-badge-${priority}">${icons[priority]} ${labels[priority]}</span>`;
        }

        // Get repeat badge HTML
        function getRepeatBadge(repeat) {
            if (repeat === 'daily') {
                return '<span class="badge repeat-badge"><i class="fas fa-sun"></i> Daily</span>';
            } else if (repeat === 'weekly') {
                return '<span class="badge repeat-badge"><i class="fas fa-calendar-week"></i> Weekly</span>';
            }
            return '';
        }

        // Feedback sounds
        function playCompleteFeedback() {
            try {
                if (navigator.vibrate) navigator.vibrate(30);
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = 700;
                gain.gain.value = 0.2;
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch (e) {}
        }

        function playAddSound() {
            try {
                if (navigator.vibrate) navigator.vibrate([15, 40, 25]);
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = 660;
                gain.gain.value = 0.2;
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.15);
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    osc2.frequency.value = 880;
                    osc2.connect(gain);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.15);
                }, 120);
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch (e) {}
        }

        function playDeleteSound() {
            try {
                if (navigator.vibrate) navigator.vibrate([20, 30, 20]);
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = 520;
                gain.gain.value = 0.2;
                osc.connect(gain).connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
                if (audioCtx.state === 'suspended') audioCtx.resume();
            } catch (e) {}
        }

        // ----- TODAY pane with priority sorting -----
        function renderTodayPane() {
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            document.getElementById('todayDateLabel').innerText = todayStr;

            const container = document.getElementById('todayTaskList');
            let filtered = activeTasks.filter(t => t.date === todayStr);
            
            if (!filtered.length) {
                container.innerHTML = '<div class="empty-message">✨ no tasks for today</div>';
            } else {
                // Sort by priority (high first)
                filtered = sortTasksByPriority(filtered);
                
                let html = '';
                filtered.forEach(t => {
                    const priorityClass = getPriorityClass(t.priority);
                    html += `
                        <div class="task-item ${priorityClass}" data-id="${t.id}">
                            <div class="task-check" data-id="${t.id}" data-action="toggle"><i class="fas fa-check"></i></div>
                            <div style="flex:1">
                                <div class="task-content">${escapeHtml(t.text)}</div>
                                <div class="task-meta">
                                    ${getPriorityBadge(t.priority)}
                                    ${getRepeatBadge(t.repeat)}
                                </div>
                            </div>
                            <button class="task-delete" data-id="${t.id}" data-action="delete"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }
            renderArchiveList();
            attachActiveListeners();
            updateArchiveCount();
        }

        // ----- MONTH pane with priority sorting -----
        function renderMonthPane() {
            const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            document.getElementById('monthNameDisplay').innerText = `${monthNames[currentMonth]} ${currentYear}`;
            
            // Render tasks for selected date (with priority sorting)
            document.getElementById('monthSelectedDate').innerText = selectedDate;
            const monthTaskContainer = document.getElementById('monthTaskList');
            let filtered = activeTasks.filter(t => t.date === selectedDate);
            
            if (!filtered.length) {
                monthTaskContainer.innerHTML = '<div class="empty-message">✨ no tasks for this date</div>';
            } else {
                // Sort by priority (high first)
                filtered = sortTasksByPriority(filtered);
                
                let html = '';
                filtered.forEach(t => {
                    const priorityClass = getPriorityClass(t.priority);
                    html += `
                        <div class="task-item ${priorityClass}" data-id="${t.id}">
                            <div class="task-check" data-id="${t.id}" data-action="toggle"><i class="fas fa-check"></i></div>
                            <div style="flex:1">
                                <div class="task-content">${escapeHtml(t.text)}</div>
                                <div class="task-meta">
                                    ${getPriorityBadge(t.priority)}
                                    ${getRepeatBadge(t.repeat)}
                                </div>
                            </div>
                            <button class="task-delete" data-id="${t.id}" data-action="delete"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
                monthTaskContainer.innerHTML = html;
            }
            
            // Render calendar grid
            const grid = document.getElementById('monthGrid');
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();
            const isCurrentMonth = (today.getFullYear() === currentYear && today.getMonth() === currentMonth);

            let html = '';
            for (let i = 0; i < 42; i++) {
                const dayNum = i - firstDay + 1;
                if (dayNum > 0 && dayNum <= daysInMonth) {
                    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}`;
                    const count = activeCountForDate(dateStr);
                    const isToday = isCurrentMonth && dayNum === today.getDate();
                    const isSelected = (dateStr === selectedDate);
                    let cls = 'cal-cell';
                    if (count > 0) cls += ' has-tasks';
                    if (isToday) cls += ' today';
                    if (isSelected) cls += ' selected';
                    const dots = '●'.repeat(Math.min(count, 5));
                    html += `<div class="${cls}" data-date="${dateStr}"><span>${dayNum}</span><span class="task-dots">${dots}</span></div>`;
                } else {
                    html += '<div class="cal-cell" style="background:transparent; pointer-events:none;"></div>';
                }
            }
            grid.innerHTML = html;

            // Attach click handlers to calendar cells
            document.querySelectorAll('#monthGrid .cal-cell[data-date]').forEach(cell => {
                cell.addEventListener('click', (e) => {
                    e.preventDefault();
                    selectedDate = cell.dataset.date;
                    renderMonthPane();
                });
            });

            attachActiveListeners();
            updateArchiveCount();
        }

        // Archive list
        function renderArchiveList() {
            const arcContainer = document.getElementById('archiveListContainer');
            document.getElementById('archiveCount').innerText = `(${completedTasks.length})`;
            if (!completedTasks.length) {
                arcContainer.innerHTML = '<div class="empty-message" style="padding:1rem;">no completed tasks</div>';
            } else {
                let html = '';
                completedTasks.slice().reverse().forEach(t => {
                    html += `
                        <div class="archive-item" data-archive-id="${t.id}">
                            <div class="task-content">${escapeHtml(t.text)}</div>
                            <button class="archive-delete-btn" data-archive-id="${t.id}" data-archive-delete="true"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    `;
                });
                arcContainer.innerHTML = html;
            }
            attachArchiveSwipeAndDelete();
        }

        // Archive swipe & delete
        function attachArchiveSwipeAndDelete() {
            document.querySelectorAll('[data-archive-delete="true"]').forEach(btn => {
                btn.removeEventListener('click', handleArchiveDelete);
                btn.addEventListener('click', handleArchiveDelete);
            });
            
            document.querySelectorAll('.archive-item').forEach(item => {
                let touchX = 0;
                const id = item.dataset.archiveId;
                
                item.addEventListener('touchstart', (e) => { 
                    touchX = e.touches[0].clientX; 
                }, {passive: true});
                
                item.addEventListener('touchmove', (e) => {
                    if (!touchX) return;
                    const diff = e.touches[0].clientX - touchX;
                    if (diff < -20) item.classList.add('swipe-left');
                    else item.classList.remove('swipe-left');
                }, {passive: true});
                
                item.addEventListener('touchend', (e) => {
                    if (!touchX) return;
                    const diff = e.changedTouches[0].clientX - touchX;
                    if (diff < -50) {
                        const idx = completedTasks.findIndex(t => t.id === id);
                        if (idx !== -1) {
                            completedTasks.splice(idx, 1);
                            save();
                            playDeleteSound();
                            if (currentTab === 'today') renderTodayPane();
                            else renderMonthPane();
                        }
                    }
                    item.classList.remove('swipe-left');
                    touchX = 0;
                });
            });
        }

        function handleArchiveDelete(e) {
            e.preventDefault();
            e.stopPropagation();
            const id = e.currentTarget.dataset.archiveId;
            const idx = completedTasks.findIndex(t => t.id === id);
            if (idx !== -1) {
                completedTasks.splice(idx, 1);
                save();
                playDeleteSound();
                if (currentTab === 'today') renderTodayPane();
                else renderMonthPane();
            }
        }

        // Active task listeners
        function attachActiveListeners() {
            document.querySelectorAll('[data-action="toggle"]').forEach(el => {
                el.removeEventListener('click', handleToggle);
                el.addEventListener('click', handleToggle);
            });
            
            document.querySelectorAll('[data-action="delete"]').forEach(el => {
                el.removeEventListener('click', handleDelete);
                el.addEventListener('click', handleDelete);
            });
            
            document.querySelectorAll('.task-item').forEach(item => {
                let touchX = 0;
                let touchStartTime = 0;
                
                item.addEventListener('touchstart', (e) => { 
                    touchX = e.touches[0].clientX;
                    touchStartTime = Date.now();
                }, {passive: true});
                
                item.addEventListener('touchend', (e) => {
                    if (!touchX) return;
                    const diff = e.changedTouches[0].clientX - touchX;
                    const touchDuration = Date.now() - touchStartTime;
                    
                    if (Math.abs(diff) > 40 && touchDuration < 300) {
                        e.preventDefault();
                        const id = item.dataset.id;
                        if (diff > 0) { // right swipe - complete
                            const task = activeTasks.find(t => t.id === id);
                            if (task) moveToCompleted(task);
                        } else { // left swipe - delete
                            activeTasks = activeTasks.filter(t => t.id !== id);
                            save();
                            playDeleteSound();
                            if (currentTab === 'today') renderTodayPane();
                            else renderMonthPane();
                        }
                    }
                    touchX = 0;
                });
            });
        }

        function moveToCompleted(task) {
            const idx = activeTasks.findIndex(t => t.id === task.id);
            if (idx !== -1) {
                const [moved] = activeTasks.splice(idx, 1);
                completedTasks.push(moved);
                save();
                playCompleteFeedback();
                if (currentTab === 'today') renderTodayPane();
                else renderMonthPane();
            }
        }

        function handleToggle(e) {
            e.preventDefault();
            const id = e.currentTarget.dataset.id;
            const task = activeTasks.find(t => t.id === id);
            if (task) moveToCompleted(task);
        }

        function handleDelete(e) {
            e.preventDefault();
            const id = e.currentTarget.dataset.id;
            activeTasks = activeTasks.filter(t => t.id !== id);
            save();
            playDeleteSound();
            if (currentTab === 'today') renderTodayPane();
            else renderMonthPane();
        }

        // + icon opens modal
        document.getElementById('plusIcon').addEventListener('click', () => {
            document.getElementById('modalDate').innerText = `📅 ${selectedDate}`;
            document.getElementById('modalTaskInput').value = '';
            
            // Reset modal selections
            selectedRepeat = 'none';
            selectedPriority = 'medium';
            updateRepeatUI();
            updatePriorityUI();
            
            document.getElementById('modalOverlay').style.display = 'flex';
        });

        // Today button - jump to current date
        document.getElementById('todayBtn').addEventListener('click', () => {
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            selectedDate = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            
            if (currentTab === 'today') {
                renderTodayPane();
            } else {
                renderMonthPane();
            }
        });

        // Modal UI updates
        function updateRepeatUI() {
            document.querySelectorAll('.option-pill').forEach(p => {
                const val = p.dataset.repeat;
                if (val === selectedRepeat) {
                    p.classList.add('selected');
                    p.innerHTML = val === 'none' ? '<i class="fas fa-check-circle"></i> None' : 
                                  (val === 'daily' ? '<i class="fas fa-check-circle"></i> Daily' : '<i class="fas fa-check-circle"></i> Weekly');
                } else {
                    p.classList.remove('selected');
                    p.innerHTML = val === 'none' ? '<i class="far fa-circle"></i> None' : 
                                  (val === 'daily' ? '<i class="fas fa-sun"></i> Daily' : '<i class="fas fa-calendar-week"></i> Weekly');
                }
            });
        }

        function updatePriorityUI() {
            document.querySelectorAll('.priority-pill').forEach(p => {
                const val = p.dataset.priority;
                if (val === selectedPriority) {
                    p.classList.add('selected');
                } else {
                    p.classList.remove('selected');
                }
            });
        }

        // Repeat option clicks
        document.getElementById('repeatNone').addEventListener('click', () => {
            selectedRepeat = 'none';
            updateRepeatUI();
        });
        document.getElementById('repeatDaily').addEventListener('click', () => {
            selectedRepeat = 'daily';
            updateRepeatUI();
        });
        document.getElementById('repeatWeekly').addEventListener('click', () => {
            selectedRepeat = 'weekly';
            updateRepeatUI();
        });

        // Priority option clicks
        document.getElementById('priorityHigh').addEventListener('click', () => {
            selectedPriority = 'high';
            updatePriorityUI();
        });
        document.getElementById('priorityMedium').addEventListener('click', () => {
            selectedPriority = 'medium';
            updatePriorityUI();
        });
        document.getElementById('priorityLow').addEventListener('click', () => {
            selectedPriority = 'low';
            updatePriorityUI();
        });

        document.getElementById('modalCancel').addEventListener('click', () => {
            document.getElementById('modalOverlay').style.display = 'none';
        });

        document.getElementById('modalAdd').addEventListener('click', () => {
            const inp = document.getElementById('modalTaskInput');
            const text = inp.value.trim();
            if (!text) return;
            
            activeTasks.push({ 
                id: Date.now() + '-' + Math.random().toString(36).substr(2, 6), 
                text, 
                date: selectedDate, 
                repeat: selectedRepeat,
                priority: selectedPriority
            });
            save(); 
            playAddSound();
            inp.value = ''; 
            document.getElementById('modalOverlay').style.display = 'none';
            if (currentTab === 'today') renderTodayPane();
            else renderMonthPane();
        });

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').style.display = 'none';
            }
        });

        document.getElementById('modalTaskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('modalAdd').click();
            }
        });

        // Tabs
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('todayPane').style.display = tab === 'today' ? 'block' : 'none';
            document.getElementById('monthPane').style.display = tab === 'monthly' ? 'block' : 'none';
            document.getElementById('tabToday').classList.toggle('active', tab === 'today');
            document.getElementById('tabMonthly').classList.toggle('active', tab === 'monthly');
            if (tab === 'today') renderTodayPane();
            else renderMonthPane();
        }

        document.getElementById('tabToday').addEventListener('click', () => switchTab('today'));
        document.getElementById('tabMonthly').addEventListener('click', () => switchTab('monthly'));

        // Archive toggle
        document.getElementById('archiveToggle').addEventListener('click', () => {
            archiveVisible = !archiveVisible;
            document.getElementById('archiveListContainer').classList.toggle('visible', archiveVisible);
            document.getElementById('archiveIcon').style.transform = archiveVisible ? 'rotate(90deg)' : 'rotate(0)';
        });

        // Month navigation
        function prevMonth() {
            if (currentMonth === 0) { 
                currentMonth = 11; 
                currentYear--; 
            } else { 
                currentMonth--; 
            }
            const firstDayStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
            selectedDate = firstDayStr;
            renderMonthPane();
        }

        function nextMonth() {
            if (currentMonth === 11) { 
                currentMonth = 0; 
                currentYear++; 
            } else { 
                currentMonth++; 
            }
            const firstDayStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-01`;
            selectedDate = firstDayStr;
            renderMonthPane();
        }

        document.getElementById('prevMonthBtn').addEventListener('click', prevMonth);
        document.getElementById('nextMonthBtn').addEventListener('click', nextMonth);

        // Initialize
        (function init() {
            const today = new Date();
            selectedDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            renderTodayPane();
            renderMonthPane();
            switchTab('today');
        })();
    })();
</script>
</body>
</html>
